<!DOCTYPE html>
<html class="h-full" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Dashboard | APTS Admin</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="/assets/js/config/tailwind-theme-base.js"></script>
  <script src="/assets/js/config/tailwind-admin.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/global/main.css" />
  <link rel="stylesheet" href="/assets/css/components/components.css" />
  <link rel="stylesheet" href="/assets/css/global/responsive.css" />
  <link rel="stylesheet" href="/assets/css/global/admin-accessibility.css" />
  <link rel="stylesheet" href="/assets/css/global/portal-mobile.css" />
  <link rel="stylesheet" href="/assets/css/features/dashboard-queue.css" />
</head>
<body>

  <div id="page-content" class="dashboard-page">

    <section class="dashboard-kpi-row" data-no-page-enter>
      <a href="reservations.html?tab=pending" class="dashboard-kpi dashboard-kpi--amber">
        <p class="dashboard-kpi__label">Waiting</p>
        <p class="dashboard-kpi__value" id="kpi-pending">—</p>
      </a>
      <a href="reservations.html?tab=rooms" class="dashboard-kpi dashboard-kpi--blue">
        <p class="dashboard-kpi__label">Coming in</p>
        <p class="dashboard-kpi__value" id="kpi-arriving">—</p>
      </a>
      <a href="reservations.html?tab=rooms" class="dashboard-kpi dashboard-kpi--slate">
        <p class="dashboard-kpi__label">Leaving</p>
        <p class="dashboard-kpi__value" id="kpi-departing">—</p>
      </a>
      <a href="payments.html" class="dashboard-kpi dashboard-kpi--rose">
        <p class="dashboard-kpi__label">Unpaid</p>
        <p class="dashboard-kpi__value" id="kpi-unpaid">—</p>
      </a>
    </section>

    <div class="dashboard-split" data-no-page-enter>
      <section class="dashboard-card">
        <header class="dashboard-card__head">
          <div>
            <h2>Waiting for you</h2>
            <p id="queue-summary">Guest requests to review</p>
          </div>
          <a href="reservations.html?tab=pending" class="dashboard-card__link">See all</a>
        </header>
        <div class="dashboard-card__body" id="action-queue-mount">
          <p class="dashboard-muted">Loading…</p>
        </div>
      </section>

      <section class="dashboard-card">
        <header class="dashboard-card__head">
          <div>
            <h2>Today</h2>
            <p id="today-summary">Who is coming and going</p>
          </div>
          <a href="calendar.html" class="dashboard-card__link">Calendar</a>
        </header>
        <div class="dashboard-card__body" id="today-mount">
          <p class="dashboard-muted">Loading…</p>
        </div>
      </section>
    </div>

    <div class="dashboard-analytics-row" data-no-page-enter>
      <section class="dashboard-card">
        <header class="dashboard-card__head">
          <div>
            <h2>Your rooms</h2>
            <p>How full the house is</p>
          </div>
          <a href="facilities.html?tab=rooms" class="dashboard-card__link">Manage</a>
        </header>
        <div class="dashboard-card__body" id="house-mount">
          <p class="dashboard-muted">Loading…</p>
        </div>
      </section>

      <section class="dashboard-card">
        <header class="dashboard-card__head">
          <div>
            <h2>This week</h2>
            <p id="load-summary">Rooms turning over each day</p>
          </div>
        </header>
        <div class="dashboard-card__body" id="load-mount">
          <p class="dashboard-muted">Loading…</p>
        </div>
      </section>
    </div>

  </div>

  <script type="module">
    import { requireAuth }   from '/assets/js/services/auth.js';
    import { initAppLayout } from '/assets/js/layout/ui.js';
    import { initSplashIdle } from '/assets/js/layout/splash-idle.js';
    import { loadDashboard } from '/assets/js/features/dashboard.js';
    import { createBookingPoll } from '/assets/js/layout/booking-poll.js';
    import { escapeHtml } from '/assets/js/features/reservation-shared.js';

    initSplashIdle({ portal: 'admin' });
    if (!(await requireAuth())) throw new Error('Not authenticated');

    await initAppLayout({
      portal:     'admin',
      activePage: 'dashboard',
      title:      'Dashboard',
      subtitle:   "Today's overview",
      deferEnhancements: true,
    });

    try {
      await loadDashboard();
      const onUpdate = () => loadDashboard({ background: true });
      window.addEventListener('booking:updated', onUpdate);
      createBookingPoll(() => loadDashboard({ background: true }));

      const { initAdminEnhancements } = await import('/assets/js/layout/animations.js');
      await initAdminEnhancements();
    } catch (err) {
      const mount = document.getElementById('page-content');
      if (mount) {
        mount.insertAdjacentHTML('afterbegin',
          `<div class="bg-rose-50 text-rose-700 border border-rose-200 rounded-lg px-4 py-3 text-sm mb-4">${escapeHtml(err.message || 'Failed to load dashboard data.')}</div>`);
      }
      console.error('Dashboard load failed:', err);
    }
  </script>
</body>
</html>
