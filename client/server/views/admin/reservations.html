<!DOCTYPE html>
<html class="h-full" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Reservations | AptSpace Admin</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="/assets/js/config/tailwind-theme-base.js"></script>
  <script src="/assets/js/config/tailwind-admin.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/global/main.css" />
  <link rel="stylesheet" href="/assets/css/components/components.css" />
  <link rel="stylesheet" href="/assets/css/global/responsive.css" />
  <link rel="stylesheet" href="/assets/css/global/admin-accessibility.css" />
  <link rel="stylesheet" href="/assets/css/global/portal-mobile.css" />
  <link rel="stylesheet" href="/assets/css/features/reservation-admin.css" />
</head>
<body>
  <div id="page-content" class="p-6 space-y-6 max-w-[1600px] mx-auto w-full">
    <div class="res-manage-intro">
      <div>
        <h2 class="res-manage-intro-title">Manage reservations</h2>
        <p class="res-manage-intro-text">Review guest requests, create room stays, and book venue spaces. Open the <a href="calendar.html" class="text-primary font-semibold hover:underline">calendar</a> for a full schedule view.</p>
      </div>
      <a href="calendar.html" class="res-manage-cal-link">
        <span class="material-symbols-outlined" aria-hidden="true">calendar_month</span>
        Open calendar
      </a>
    </div>
    <div id="action-cards-mount"></div>
  </div>

  <script type="module">
    import { requireAuth }   from '/assets/js/services/auth.js';
    import { initAppLayout } from '/assets/js/layout/ui.js';
    import { getBookings, getGroups, getFacilityBookings } from '/assets/js/services/api.js';

    if (!requireAuth()) throw new Error('Not authenticated');

    async function syncPendingBadge() {
      const [bookings, groups, venues] = await Promise.all([
        getBookings(), getGroups(), getFacilityBookings(),
      ]);
      const roomPending = bookings.filter((b) => !b.group_id && String(b.status).toLowerCase() === 'pending').length
        + groups.filter((g) => String(g.status).toLowerCase() === 'pending').length;
      const venuePending = venues.filter((v) => String(v.status).toLowerCase() === 'pending').length;

      const countEl = document.getElementById('pending-count');
      if (countEl) countEl.textContent = `${roomPending} PENDING`;

      const venueEl = document.getElementById('venue-pending-count');
      if (venueEl) {
        venueEl.textContent = `${venuePending} PENDING`;
        venueEl.classList.toggle('hidden', venuePending === 0);
      }
    }

    const actionCards = await fetch('/components/action-cards-reservations.html').then(r => r.text());
    document.getElementById('action-cards-mount').innerHTML = actionCards;

    await initAppLayout({
      portal:     'admin',
      activePage: 'reservations',
      title:      'Reservations',
      subtitle:   'Rooms, groups & venue spaces',
      deferEnhancements: true,
    });

    const { initAdminEnhancements } = await import('/assets/js/layout/animations.js');
    await initAdminEnhancements();

    window.addEventListener('booking:updated', syncPendingBadge);
    syncPendingBadge();
  </script>
</body>
</html>
