<!DOCTYPE html>
<html class="h-full" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Reservations | APTS Admin</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="/assets/js/config/tailwind-theme-base.js"></script>
  <script src="/assets/js/config/tailwind-admin.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/global/main.css" />
  <link rel="stylesheet" href="/assets/css/components/components.css" />
  <link rel="stylesheet" href="/assets/css/global/responsive.css" />
  <link rel="stylesheet" href="/assets/css/global/admin-accessibility.css" />
  <link rel="stylesheet" href="/assets/css/global/portal-mobile.css" />
  <link rel="stylesheet" href="/assets/css/features/manage-requests-modal.css" />
  <link rel="stylesheet" href="/assets/css/features/reservation-admin.css" />
</head>
<body>
  <div id="page-content" class="res-hub-page p-6 max-w-[1600px] mx-auto w-full">

    <nav class="res-hub-tabs" aria-label="Reservation sections">
      <button type="button" data-res-tab="pending" class="res-hub-tab is-active">
        Pending
        <span class="res-hub-tab-badge" data-res-tab-badge="pending">0</span>
      </button>
      <button type="button" data-res-tab="rooms" class="res-hub-tab">Room stays</button>
      <button type="button" data-res-tab="groups" class="res-hub-tab">Group stays</button>
      <button type="button" data-res-tab="venues" class="res-hub-tab">
        Venues
        <span class="res-hub-tab-badge hidden" data-res-tab-badge="venues">0</span>
      </button>
    </nav>

    <section id="res-hub-panel" class="res-hub-panel">
      <div class="res-hub-toolbar">
        <div class="res-hub-toolbar__search">
          <span class="material-symbols-outlined" aria-hidden="true">search</span>
          <input id="res-hub-search" type="search" class="res-input" placeholder="Search by guest name, email, or ID…" autocomplete="off" />
        </div>
        <div class="res-hub-toolbar__actions">
          <select id="res-hub-filter" class="res-input res-input--select hidden" aria-label="Filter list"></select>
          <button type="button" id="res-hub-create-room" class="res-btn res-btn--primary hidden">
            <span class="material-symbols-outlined">add</span> New room stay
          </button>
          <button type="button" id="res-hub-create-group" class="res-btn res-btn--primary hidden">
            <span class="material-symbols-outlined">groups</span> New group stay
          </button>
          <button type="button" id="res-hub-create-venue" class="res-btn res-btn--primary hidden">
            <span class="material-symbols-outlined">event</span> Book venue
          </button>
        </div>
      </div>
      <p id="res-hub-count" class="res-hub-count">Loading…</p>
      <div id="res-hub-list" class="res-hub-list">
        <div class="res-empty-box">Loading reservations…</div>
      </div>
    </section>

  </div>

  <script type="module">
    import { requireAuth } from '/assets/js/services/auth.js';
    import { initAppLayout } from '/assets/js/layout/ui.js';
    import { bootstrapReservationsHub } from '/assets/js/features/admin-reservations-hub.js';

    if (!(await requireAuth())) throw new Error('Not authenticated');

    await initAppLayout({
      portal:     'admin',
      activePage: 'reservations',
      title:      'Reservations',
      subtitle:   'Review and approve booking requests',
      deferEnhancements: true,
    });

    await bootstrapReservationsHub();

    const { initAdminEnhancements } = await import('/assets/js/layout/animations.js');
    await initAdminEnhancements();
  </script>
</body>
</html>
