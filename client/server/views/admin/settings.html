<!DOCTYPE html>
<html class="h-full" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings | AptSpace Admin</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="/assets/js/config/tailwind-theme-base.js"></script>
  <script src="/assets/js/config/tailwind-admin.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/global/main.css" />
  <link rel="stylesheet" href="/assets/css/components/components.css" />
  <link rel="stylesheet" href="/assets/css/global/responsive.css" />
  <link rel="stylesheet" href="/assets/css/global/admin-accessibility.css" />
  <link rel="stylesheet" href="/assets/css/global/tabs-layout.css" />
  <link rel="stylesheet" href="/assets/css/features/manage-requests-modal.css" />
</head>
<body>
  <div id="page-content">
    <section class="admin-panel settings-workspace app-tab-workspace">
      <div class="admin-panel-header flex-col items-stretch gap-4">
        <div class="flex items-center gap-4">
          <div class="w-1.5 h-8 bg-primary rounded-full shrink-0"></div>
          <h3 class="font-headline-sm text-on-surface m-0">System Settings</h3>
        </div>
        <div class="app-tabs w-full" role="tablist" aria-label="Settings sections">
          <button type="button" role="tab" data-settings-tab="account" class="app-tab-btn app-tab-active" aria-selected="true">Account</button>
          <button type="button" role="tab" data-settings-tab="roles" class="app-tab-btn" aria-selected="false">User Roles</button>
          <button type="button" role="tab" data-settings-tab="system" class="app-tab-btn" aria-selected="false">System</button>
        </div>
      </div>

      <div class="app-tab-panels max-w-full">
        <div data-settings-panel="account" class="app-tab-panel space-y-4" role="tabpanel">
          <div>
            <label class="text-label-sm text-on-surface-variant block mb-1" for="settings-name">Full Name</label>
            <input type="text" id="settings-name" class="w-full border border-outline-variant rounded-lg px-3 py-2.5 text-body-sm" />
          </div>
          <div>
            <label class="text-label-sm text-on-surface-variant block mb-1" for="settings-email">Email</label>
            <input type="email" id="settings-email" readonly class="w-full border border-outline-variant rounded-lg px-3 py-2.5 text-body-sm bg-slate-50" />
          </div>
          <div>
            <label class="text-label-sm text-on-surface-variant block mb-1" for="settings-role">Role</label>
            <input type="text" id="settings-role" readonly class="w-full border border-outline-variant rounded-lg px-3 py-2.5 text-body-sm bg-slate-50" />
          </div>
          <div id="settings-feedback" class="hidden"></div>
          <button type="button" id="settings-save-btn" class="btn-primary">Save Changes</button>
        </div>

        <div data-settings-panel="roles" class="app-tab-panel is-tab-hidden space-y-4" role="tabpanel">
          <table class="data-table w-full">
            <thead><tr><th>Role</th><th>Description</th><th>Users</th></tr></thead>
            <tbody id="settings-roles-tbody">
              <tr><td colspan="3" class="text-center py-6 text-on-surface-variant">Loading...</td></tr>
            </tbody>
          </table>
        </div>

        <div data-settings-panel="system" class="app-tab-panel is-tab-hidden space-y-4" role="tabpanel">
          <div class="p-4 rounded-lg border border-primary/20 bg-primary/5 space-y-3">
            <div class="flex items-center gap-2">
              <span class="material-symbols-outlined text-primary">calendar_month</span>
              <h4 class="font-label-md font-bold text-on-surface">Fiscal Year & Booking Window</h4>
            </div>
            <p class="text-body-sm text-on-surface-variant" id="sys-fiscal-year-summary">Loading…</p>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
              <div>
                <label class="text-label-sm text-on-surface-variant block mb-1" for="fy-start-month">Fiscal year starts (month)</label>
                <select id="fy-start-month" class="w-full border border-outline-variant rounded-lg px-3 py-2.5 text-body-sm">
                  <option value="1">January</option>
                  <option value="2">February</option>
                  <option value="3">March</option>
                  <option value="4">April</option>
                  <option value="5">May</option>
                  <option value="6">June</option>
                  <option value="7">July</option>
                  <option value="8">August</option>
                  <option value="9">September</option>
                  <option value="10">October</option>
                  <option value="11">November</option>
                  <option value="12">December</option>
                </select>
              </div>
              <div>
                <label class="text-label-sm text-on-surface-variant block mb-1" for="fy-start-day">Start day</label>
                <input type="number" id="fy-start-day" min="1" max="31" value="1" class="w-full border border-outline-variant rounded-lg px-3 py-2.5 text-body-sm" />
              </div>
              <div>
                <label class="text-label-sm text-on-surface-variant block mb-1" for="fy-advance-months">Advance booking (months)</label>
                <input type="number" id="fy-advance-months" min="1" max="36" value="12" class="w-full border border-outline-variant rounded-lg px-3 py-2.5 text-body-sm" />
              </div>
            </div>
            <div id="fy-settings-feedback" class="hidden"></div>
            <button type="button" id="fy-settings-save-btn" class="btn-primary">Save Fiscal Year Settings</button>
          </div>

          <div>
            <label class="text-label-sm text-on-surface-variant block mb-1">Timezone</label>
            <input type="text" readonly value="Asia/Manila (UTC+8)" class="w-full border border-outline-variant rounded-lg px-3 py-2.5 text-body-sm bg-slate-50" />
          </div>
        </div>
      </div>
    </section>
  </div>

  <script type="module">
    import { requireAuth } from '/assets/js/services/auth.js';
    import { initAppLayout } from '/assets/js/layout/ui.js';
    import { initAdminEnhancements } from '/assets/js/layout/animations.js';
    import { loadAdminSettings } from '/assets/js/features/settings.js';

    if (!requireAuth()) throw new Error('Not authenticated');

    await initAppLayout({
      portal: 'admin',
      activePage: 'settings',
      title: 'Settings',
      subtitle: 'Mission Control',
      deferEnhancements: true,
    });

    try {
      await loadAdminSettings();
      await initAdminEnhancements();
    } catch (err) {
      console.error(err);
      const { releaseChromeBoot } = await import('/assets/js/layout/animations.js');
      releaseChromeBoot();
    }
  </script>
</body>
</html>
