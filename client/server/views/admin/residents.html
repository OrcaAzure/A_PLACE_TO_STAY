<!DOCTYPE html>
<html class="h-full" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Guest Access | APTS Admin</title>
  <link rel="stylesheet" href="/assets/css/global/tailwind-built.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/global/main.css" />
  <link rel="stylesheet" href="/assets/css/components/components.css" />
  <link rel="stylesheet" href="/assets/css/global/responsive.css" />
  <link rel="stylesheet" href="/assets/css/global/admin-accessibility.css" />
  <link rel="stylesheet" href="/assets/css/global/portal-mobile.css" />
  <link rel="stylesheet" href="/assets/css/features/manage-requests-modal.css" />
  <link rel="stylesheet" href="/assets/css/features/admin-crud-modal.css" />
  <link rel="stylesheet" href="/assets/css/features/admin-facilities-page.css" />
  <link rel="stylesheet" href="/assets/css/features/admin-settings-page.css" />
  <link rel="stylesheet" href="/assets/css/features/admin-guest-access.css" />
</head>
<body class="h-full bg-slate-50/50">

  <div id="page-content" class="res-hub-page p-6 max-w-[1600px] mx-auto w-full antialiased text-slate-700">

    <nav class="res-hub-tabs" aria-label="Guest access sections">
      <button type="button" data-ga-tab="main" class="res-hub-tab is-active">Accounts</button>
      <button type="button" data-ga-tab="activity" class="res-hub-tab">Activity</button>
    </nav>

    <div id="ga-panel-main" class="ga-panel">
      <div class="ga-stats ga-stats--ops">
        <article class="ga-stat ga-stat--ops ga-stat--pending" id="ga-stat-pending-card">
          <span class="ga-stat__value" id="ga-stat-pending">—</span>
          <span class="ga-stat__label">Pending requests</span>
          <span id="ga-stat-pending-hint" class="ga-stat-pending__hint hidden">Click to view list</span>
        </article>
        <article class="ga-stat ga-stat--ops">
          <span class="ga-stat__value" id="ga-stat-arriving">—</span>
          <span class="ga-stat__label">Arriving this week</span>
        </article>
        <article class="ga-stat ga-stat--ops">
          <span class="ga-stat__value" id="ga-stat-staying">—</span>
          <span class="ga-stat__label">Currently staying</span>
        </article>
      </div>

      <section class="res-hub-panel res-hub-panel--table">
        <div id="ga-review-notice" class="ga-review-notice hidden" role="status">
          <p id="ga-review-notice-text">Some guests may no longer need portal access.</p>
          <div class="ga-review-notice__actions">
            <button type="button" id="ga-review-show-btn" class="ga-btn-text ga-btn-text--primary">Show in list</button>
            <button type="button" id="ga-bulk-deactivate-btn" class="admin-crud-btn-ghost ga-review-notice__bulk js-requires-write hidden">
              <span class="material-symbols-outlined text-[18px]">person_off</span>
              <span id="ga-bulk-deactivate-label">Deactivate all</span>
            </button>
          </div>
        </div>
        <div class="res-hub-toolbar">
          <div class="res-hub-toolbar__search">
            <span class="material-symbols-outlined" aria-hidden="true">search</span>
            <input id="guest-access-search" type="search" class="res-input" placeholder="Search by name or email…" autocomplete="off" />
          </div>
          <div class="res-hub-toolbar__actions">
            <div class="ga-filter-wrap">
              <button type="button" id="ga-filter-toggle" class="ga-filter-btn" aria-expanded="false" aria-controls="ga-filter-panel" aria-haspopup="true">
                <span class="material-symbols-outlined" aria-hidden="true">filter_list</span>
                <span id="ga-filter-label">All guests</span>
              </button>
              <div id="ga-filter-panel" class="ga-filter-panel hidden" role="menu" aria-label="Filter guest accounts">
                <p class="ga-filter-panel__title">Show accounts</p>
                <button type="button" class="ga-filter-option is-active" data-ga-filter="all" role="menuitem">All guests</button>
                <button type="button" class="ga-filter-option" data-ga-filter="active" role="menuitem">Active only</button>
                <button type="button" class="ga-filter-option" data-ga-filter="inactive" role="menuitem">Inactive only</button>
                <button type="button" class="ga-filter-option" data-ga-filter="in_stay" role="menuitem">Currently staying</button>
                <button type="button" class="ga-filter-option" data-ga-filter="arriving" role="menuitem">Arriving soon</button>
                <button type="button" class="ga-filter-option" data-ga-filter="review" role="menuitem">Needs review</button>
              </div>
            </div>
            <button type="button" id="add-guest-btn" class="res-btn res-btn--primary js-requires-write">
              <span class="material-symbols-outlined" aria-hidden="true">person_add</span>
              Add guest
            </button>
          </div>
        </div>
        <p id="ga-accounts-count" class="res-hub-count">Loading guest accounts…</p>
        <div class="ga-table-wrap">
          <table class="data-table ga-table w-full">
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Access</th>
                <th class="ga-col-reservation">Reservation</th>
                <th class="ga-col-actions">Actions</th>
              </tr>
            </thead>
            <tbody id="guest-access-tbody">
              <tr><td colspan="6"><p class="ga-empty">Loading guest accounts…</p></td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>

    <div id="ga-panel-activity" class="ga-panel hidden">
      <section class="res-hub-panel res-hub-panel--flush">
        <ul id="guest-activity-list" class="ga-activity-list">
          <li class="ga-empty">Loading activity…</li>
        </ul>
      </section>
    </div>
  </div>

  <script type="module">
    import { requireAuth, guardGuestAccessPage } from '/assets/js/services/auth.js';
    import { initAppLayout } from '/assets/js/layout/ui.js';
    import { initGuestAccessPage, loadGuestAccessPage } from '/assets/js/features/admin-guest-access.js';

    if (!(await requireAuth())) throw new Error('Not authenticated');
    if (!guardGuestAccessPage()) throw new Error('Guest Access not permitted');

    await initAppLayout({
      portal:     'admin',
      activePage: 'residents',
      title:      'Guest Access',
      subtitle:   'Manage guest logins and portal access',
      deferEnhancements: true,
    });

    initGuestAccessPage();
    await loadGuestAccessPage();

    const { initAdminEnhancements } = await import('/assets/js/layout/animations.js');
    await initAdminEnhancements();
  </script>
</body>
</html>
