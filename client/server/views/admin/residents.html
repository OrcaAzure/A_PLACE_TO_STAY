<!DOCTYPE html>
<html class="h-full" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Residents | AptSpace Admin</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="/assets/js/config/tailwind-admin.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/global/main.css" />
  <link rel="stylesheet" href="/assets/css/components/components.css" />
  <link rel="stylesheet" href="/assets/css/global/responsive.css" />
</head>
<body>
  <div id="page-content">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
      <div class="action-card">
        <div class="action-card-icon bg-primary-container/10 text-primary">
          <span class="material-symbols-outlined text-[28px]">groups</span>
        </div>
        <div>
          <h4 class="font-headline-sm text-on-surface">Resident Overview</h4>
          <p class="text-body-sm text-on-surface-variant mt-1">Current occupancy and resident stats.</p>
        </div>
        <div class="mt-auto pt-4 border-t border-outline-variant/30">
          <span id="active-count" class="text-primary text-[10px] font-bold">LOADING...</span>
        </div>
      </div>
      <div class="action-card">
        <div class="action-card-icon bg-surface-container-high text-on-surface-variant">
          <span class="material-symbols-outlined text-[28px]">login</span>
        </div>
        <div>
          <h4 class="font-headline-sm text-on-surface">Check-In Queue</h4>
          <p class="text-body-sm text-on-surface-variant mt-1">Arrivals scheduled for today.</p>
        </div>
        <div class="mt-auto pt-4 border-t border-outline-variant/30">
          <span class="bg-error/10 text-error text-[10px] px-2 py-1 rounded-full font-bold">6 ARRIVING TODAY</span>
        </div>
      </div>
    </div>

    <section class="timeline-workspace">
      <div class="timeline-workspace-header">
        <div class="flex items-center gap-4">
          <div class="w-1.5 h-8 bg-primary rounded-full"></div>
          <h3 class="font-headline-sm text-on-surface">Resident Directory</h3>
        </div>
        <input id="search-residents" type="search" placeholder="Search residents..."
          class="border border-outline-variant rounded-lg px-3 py-2 text-body-sm w-64" />
      </div>
      <div class="overflow-x-auto">
        <table class="data-table">
          <thead>
            <tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Joined</th></tr>
          </thead>
          <tbody id="residents-tbody">
            <tr><td colspan="5" class="text-center text-on-surface-variant py-8">Loading residents...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <script type="module">
    import { requireAuth }          from '/assets/js/services/auth.js';
    import { initAppLayout }        from '/assets/js/layout/ui.js';
    import { getUsers, normalizeUser } from '/assets/js/services/api.js';

    if (!requireAuth()) throw new Error('Not authenticated');

    await initAppLayout({
      portal:     'admin',
      activePage: 'residents',
      title:      'Resident Operations Center',
      subtitle:   'Mission Control',
    });

    // load real users from the API
    try {
      const users  = await getUsers();
      const active = users.filter(u => u.status === 'Active');

      document.getElementById('active-count').textContent = `${active.length} ACTIVE`;

      const tbody = document.getElementById('residents-tbody');
      if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-on-surface-variant py-8">No residents found.</td></tr>';
      } else {
        tbody.innerHTML = users.map(u => {
          const norm = normalizeUser(u);
          const statusClass = u.status === 'Active' ? 'status-pill-approved' : 'status-pill-pending';
          const date = norm.createdAt ? new Date(norm.createdAt).toLocaleDateString('en-PH', { month:'short', day:'2-digit', year:'numeric' }) : '—';
          return `<tr>
            <td class="font-medium">${norm.name}</td>
            <td>${norm.email}</td>
            <td>${norm.role}</td>
            <td><span class="${statusClass} text-[10px] px-2 py-0.5 rounded-full font-bold">${u.status}</span></td>
            <td>${date}</td>
          </tr>`;
        }).join('');
      }

      // search filter
      document.getElementById('search-residents')?.addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase();
        tbody.querySelectorAll('tr').forEach(row => {
          row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
        });
      });

    } catch (err) {
      document.getElementById('residents-tbody').innerHTML =
        `<tr><td colspan="5" class="text-center text-error py-8">${err.message}</td></tr>`;
    }
  </script>
</body>
</html>
