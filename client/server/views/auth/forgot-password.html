<!DOCTYPE html>
<html class="h-full" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password | APTS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/global/main.css" />
  <!-- Tailwind utilities last so they win ties, matching old CDN injection order -->
  <link rel="stylesheet" href="/assets/css/global/tailwind-built.css" />
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-4">
  <main class="w-full max-w-md bg-white border border-outline-variant rounded-xl shadow-sm p-8">
    <h1 class="text-headline-md font-bold text-primary mb-0.5">APTS</h1>
    <p class="apts-brand-tagline text-[15px] mb-1">A Place To Stay</p>
    <p class="text-body-sm text-on-surface-variant mb-6">Reset your password</p>

    <form id="forgotForm" class="space-y-4">
      <div>
        <label class="text-label-sm text-on-surface-variant block mb-1" for="email">Email</label>
        <input type="email" id="email" placeholder="Your account email"
          class="w-full border border-outline-variant rounded-lg px-3 py-2.5 text-body-sm" required />
      </div>

      <div id="forgotError" class="hidden text-body-sm text-error bg-error/10 rounded-lg px-3 py-2"></div>
      <div id="forgotSuccess" class="hidden text-body-sm text-primary bg-primary/10 rounded-lg px-3 py-2"></div>

      <button type="submit"
        class="w-full bg-primary hover:bg-primary/90 text-white py-3 rounded-lg font-label-md transition-colors disabled:opacity-50">
        Send reset link
      </button>
    </form>

    <p class="text-body-sm text-on-surface-variant mt-6 text-center">
      <a href="/login.html" class="text-primary hover:underline">Back to login</a>
    </p>
  </main>

  <script type="module">
    const form = document.getElementById('forgotForm');
    if (form) {
      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value.trim();
        const errorEl = document.getElementById('forgotError');
        const successEl = document.getElementById('forgotSuccess');
        const btn = form.querySelector('button[type="submit"]');

        btn.disabled = true;
        btn.textContent = 'Sending...';
        errorEl?.classList.add('hidden');
        successEl?.classList.add('hidden');

        try {
          const response = await fetch('/api/auth/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email }),
          });
          const data = await response.json();
          if (!response.ok) throw new Error(data.message || 'Request failed');

          if (successEl) {
            successEl.textContent = data.message;
            successEl.classList.remove('hidden');
          }
        } catch (err) {
          if (errorEl) {
            errorEl.textContent = err.message || 'Something went wrong';
            errorEl.classList.remove('hidden');
          }
        } finally {
          btn.disabled = false;
          btn.textContent = 'Send reset link';
        }
      });
    }
  </script>
</body>
</html>
