<!DOCTYPE html>
<html class="h-full" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Login | APTS</title>
  <link rel="icon" href="/assets/img/apts-favicon.svg" type="image/svg+xml"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/assets/js/config/tailwind-theme-base.js"></script>
  <script src="/assets/js/config/tailwind-admin.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/global/main.css" />
  <style>
    .password-field__input::-ms-reveal,
    .password-field__input::-ms-clear {
      display: none;
    }

    .password-field__input::-webkit-textfield-decoration-container {
      display: none;
    }

    .password-field__toggle {
      position: relative;
      width: 2.75rem;
    }

    .password-field__icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .password-field__icon.hidden {
      display: none;
    }
  </style>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-4">
  <main class="w-full max-w-md bg-white border border-outline-variant rounded-xl shadow-sm p-8">
    <div class="flex flex-col items-center text-center mb-6">
      <img src="/assets/img/apts-mark.svg" alt="APTS" width="64" height="64" class="w-16 h-16 mb-3" decoding="async"/>
      <h1 class="text-headline-md font-bold text-primary mb-0.5">APTS</h1>
      <p class="apts-brand-tagline text-[15px] mb-2">A Place to Stay</p>
      <p class="text-body-sm text-on-surface-variant">Welcome — Log in</p>
    </div>

    <form id="loginForm" class="space-y-4" method="post" action="/login.html" autocomplete="on" onsubmit="return false;">
      <div>
        <label class="text-label-sm text-on-surface-variant block mb-1" for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Sign-in email to APTS"
          class="w-full border border-outline-variant rounded-lg px-3 py-2.5 text-body-sm" required />
      </div>
      <div>
        <label class="text-label-sm text-on-surface-variant block mb-1" for="password">Password</label>
        <div class="relative">
          <input type="password" id="password" name="password" placeholder="Password" autocomplete="current-password"
            class="password-field__input w-full border border-outline-variant rounded-lg px-3 py-2.5 pr-10 text-body-sm" required />
          <button type="button" id="togglePassword"
            class="password-field__toggle absolute inset-y-0 right-0 flex items-center px-3 text-on-surface-variant hover:text-primary transition-colors"
            aria-label="Show password" aria-pressed="false">
            <span class="material-symbols-outlined text-[20px] password-field__icon password-field__icon--show" aria-hidden="true">visibility</span>
            <span class="material-symbols-outlined text-[20px] password-field__icon password-field__icon--hide hidden" aria-hidden="true">visibility_off</span>
          </button>
        </div>
      </div>

      <p class="text-body-sm text-right">
        <a href="/forgot-password.html" class="text-primary hover:underline">Forgot password?</a>
      </p>

      <!-- error message shown on failed login -->
      <div id="loginError" class="hidden text-body-sm text-error bg-error/10 rounded-lg px-3 py-2"></div>

      <button type="submit"
        class="w-full bg-primary hover:bg-primary/90 text-white py-3 rounded-lg font-label-md transition-colors disabled:opacity-50">
        Log in
      </button>
    </form>
  </main>

  <script nomodule>
    (function () {
      var el = document.getElementById('loginError');
      if (!el) return;
      el.textContent = 'This browser cannot run APTS login scripts. Please use a current Chrome, Edge, or Firefox.';
      el.classList.remove('hidden');
    })();
  </script>
  <script type="module">
    const errorEl = document.getElementById('loginError');
    const form = document.getElementById('loginForm');
    const showLoginError = (message) => {
      if (!errorEl) return;
      errorEl.textContent = message;
      errorEl.classList.remove('hidden');
    };

    try {
      const { redirectIfLoggedIn, ADMIN_PORTAL_ROLES, setAuthSession } = await import('/assets/js/services/auth.js');
      const { login } = await import('/assets/js/services/api.js');

      const params = new URLSearchParams(window.location.search);
      if (params.get('reason') === 'session') {
        showLoginError('You were signed out because this account was used on another device. Please log in again.');
      }

      redirectIfLoggedIn();

      const passwordInput = document.getElementById('password');
      const togglePasswordBtn = document.getElementById('togglePassword');
      const iconShow = togglePasswordBtn?.querySelector('.password-field__icon--show');
      const iconHide = togglePasswordBtn?.querySelector('.password-field__icon--hide');

      if (passwordInput && togglePasswordBtn && iconShow && iconHide) {
        togglePasswordBtn.addEventListener('click', () => {
          const willShow = passwordInput.type === 'password';
          passwordInput.type = willShow ? 'text' : 'password';
          iconShow.classList.toggle('hidden', willShow);
          iconHide.classList.toggle('hidden', !willShow);
          togglePasswordBtn.setAttribute('aria-label', willShow ? 'Hide password' : 'Show password');
          togglePasswordBtn.setAttribute('aria-pressed', String(willShow));
        });
      }

      if (form) {
        form.addEventListener('submit', async (e) => {
          e.preventDefault();

          const email = document.getElementById('email').value.trim();
          const password = document.getElementById('password').value;
          const btn = form.querySelector('button[type="submit"]');

          btn.disabled = true;
          btn.textContent = 'Signing in...';
          errorEl?.classList.add('hidden');

          try {
            const data = await login(email, password);
            setAuthSession(data.user);

            const role = data.user.role || '';
            if (ADMIN_PORTAL_ROLES.includes(role)) {
              window.location.href = '/admin/dashboard.html';
            } else {
              window.location.href = '/guest/dashboard.html';
            }
          } catch (err) {
            showLoginError(err.message || 'Invalid email or password');
          } finally {
            btn.disabled = false;
            btn.textContent = 'Log in';
          }
        });
      }
    } catch (err) {
      showLoginError(
        `Login page failed to load (${err?.message || 'script error'}). Hard-refresh (Ctrl+F5) and try again.`,
      );
      console.error('[login] failed to initialize', err);
    }
  </script>
</body>
</html>
