<!DOCTYPE html>
<html class="h-full" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Login | AptSpace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/assets/js/config/tailwind-theme-base.js"></script>
  <script src="/assets/js/config/tailwind-admin.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/global/main.css" />
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-4">
  <main class="w-full max-w-md bg-white border border-outline-variant rounded-xl shadow-sm p-8">
    <h1 class="text-headline-md font-bold text-primary mb-1">AptSpace</h1>
    <p class="text-body-sm text-on-surface-variant mb-6"> Welcome  to AptSpace — Log in</p>

    <form id="loginForm" class="space-y-4">
      <div>
        <label class="text-label-sm text-on-surface-variant block mb-1" for="email">Email</label>
        <input type="email" id="email" placeholder="Sign-in email to AptSpace"
          class="w-full border border-outline-variant rounded-lg px-3 py-2.5 text-body-sm" required />
      </div>
      <div>
        <label class="text-label-sm text-on-surface-variant block mb-1" for="password">Password</label>
        <input type="password" id="password" placeholder="Password"
          class="w-full border border-outline-variant rounded-lg px-3 py-2.5 text-body-sm" required />
      </div>

      <p class="text-body-sm text-right">
        <a href="/forgot-password.html" class="text-primary hover:underline">Forgot password?</a>
      </p>

      <!-- error message shown on failed login -->
      <div id="loginError" class="hidden text-body-sm text-error bg-error/10 rounded-lg px-3 py-2"></div>

      <button type="submit"
        class="w-full bg-primary hover:bg-primary/90 text-white py-3 rounded-lg font-label-md transition-colors disabled:opacity-50">
        Log in
      </button>
    </form>
  </main>

  <script type="module">
    import { redirectIfLoggedIn } from '/assets/js/services/auth.js';
    import { login } from '/assets/js/services/api.js';

    redirectIfLoggedIn();

    const form = document.getElementById('loginForm');
    if (form) {
      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const errorEl  = document.getElementById('loginError');
        const btn      = form.querySelector('button[type="submit"]');

        btn.disabled = true;
        btn.textContent = 'Signing in...';
        errorEl?.classList.add('hidden');

        try {
          const data = await login(email, password);
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));

          const role = data.user.role || '';
          if (role === 'Super Admin' || role === 'Admin') {
            window.location.href = '/admin/dashboard.html';
          } else {
            window.location.href = '/guest/dashboard.html';
          }
        } catch (err) {
          if (errorEl) {
            errorEl.textContent = err.message || 'Invalid email or password';
            errorEl.classList.remove('hidden');
          }
        } finally {
          btn.disabled = false;
          btn.textContent = 'Log in';
        }
      });
    }
  </script>
</body>
</html>
