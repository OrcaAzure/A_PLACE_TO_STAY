<!DOCTYPE html>
<html class="h-full" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | APTS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/assets/js/config/tailwind-theme-base.js"></script>
  <script src="/assets/js/config/tailwind-admin.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/global/main.css" />
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-4">
  <main class="w-full max-w-md bg-white border border-outline-variant rounded-xl shadow-sm p-8">
    <h1 class="text-headline-md font-bold text-primary mb-0.5">APTS</h1>
    <p class="text-[12px] font-medium tracking-wide mb-1" style="color:#D4A017">A Place to Stay</p>
    <p class="text-body-sm text-on-surface-variant mb-6">Choose a new password</p>

    <form id="resetForm" class="space-y-4">
      <div>
        <label class="text-label-sm text-on-surface-variant block mb-1" for="password">New password</label>
        <input type="password" id="password" placeholder="New password"
          class="w-full border border-outline-variant rounded-lg px-3 py-2.5 text-body-sm" required minlength="6" />
      </div>
      <div>
        <label class="text-label-sm text-on-surface-variant block mb-1" for="confirmPassword">Confirm password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm new password"
          class="w-full border border-outline-variant rounded-lg px-3 py-2.5 text-body-sm" required minlength="6" />
      </div>

      <div id="resetError" class="hidden text-body-sm text-error bg-error/10 rounded-lg px-3 py-2"></div>

      <button type="submit"
        class="w-full bg-primary hover:bg-primary/90 text-white py-3 rounded-lg font-label-md transition-colors disabled:opacity-50">
        Reset password
      </button>
    </form>

    <p class="text-body-sm text-on-surface-variant mt-6 text-center">
      <a href="/login.html" class="text-primary hover:underline">Back to login</a>
    </p>
  </main>

  <script type="module">
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    const form = document.getElementById('resetForm');
    if (form) {
      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const errorEl = document.getElementById('resetError');
        const btn = form.querySelector('button[type="submit"]');

        errorEl?.classList.add('hidden');

        if (!token) {
          if (errorEl) {
            errorEl.textContent = 'Invalid reset link. Please request a new one.';
            errorEl.classList.remove('hidden');
          }
          return;
        }

        if (password !== confirmPassword) {
          if (errorEl) {
            errorEl.textContent = 'Passwords do not match';
            errorEl.classList.remove('hidden');
          }
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Resetting...';

        try {
          const response = await fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, new_password: password }),
          });
          const data = await response.json();
          if (!response.ok) throw new Error(data.message || 'Reset failed');

          window.location.href = '/login.html';
        } catch (err) {
          if (errorEl) {
            errorEl.textContent = err.message || 'Something went wrong';
            errorEl.classList.remove('hidden');
          }
        } finally {
          btn.disabled = false;
          btn.textContent = 'Reset password';
        }
      });
    }
  </script>
</body>
</html>
