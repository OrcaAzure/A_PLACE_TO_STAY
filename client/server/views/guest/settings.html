<!DOCTYPE html>
<html class="h-full" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Settings | AptSpace Guest</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="/assets/js/config/tailwind-theme-base.js"></script>
    <script src="/assets/js/config/tailwind-admin.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/assets/css/global/main.css" />
    <link rel="stylesheet" href="/assets/css/components/components.css" />
    <link rel="stylesheet" href="/assets/css/global/responsive.css" />
    <link rel="stylesheet" href="/assets/css/global/admin-accessibility.css" />
    <link rel="stylesheet" href="/assets/css/global/guest-layout.css" />
    <link rel="stylesheet" href="/assets/css/global/tabs-layout.css" />
    <style>
        .soft-shadow { box-shadow: 0px 1px 3px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div id="page-content">
    <div class="app-tab-workspace bg-surface-container-lowest rounded-lg soft-shadow border border-outline-variant/30 max-w-full">
    <div class="app-tabs px-lg pt-md" role="tablist" aria-label="Settings sections">
        <button type="button" role="tab" data-guest-tab="profile" class="app-tab-btn app-tab-active" aria-selected="true">Profile</button>
        <button type="button" role="tab" data-guest-tab="notifications" class="app-tab-btn" aria-selected="false">Notifications</button>
        <button type="button" role="tab" data-guest-tab="security" class="app-tab-btn" aria-selected="false">Security</button>
    </div>

    <div class="app-tab-panels">
    <section class="app-tab-panel space-y-lg" data-guest-panel="profile" role="tabpanel">
        <div class="bg-surface-container-lowest rounded-lg soft-shadow p-lg border border-outline-variant/30">
            <h3 class="font-headline-sm text-headline-sm mb-lg">Profile Information</h3>
            <div class="flex flex-col md:flex-row items-center gap-xl mb-xl">
                <div class="relative">
                    <img class="w-32 h-32 rounded-lg object-cover bg-surface-container border border-outline-variant" id="avatar-preview" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA5rLHL9vvMhQE1nQQlK8H1Z3O_8DbQXbMrdDZFAjXQCvjXHo6yPhpESrynM3HWgVjOczmK5ar2PyR2_SHINP8xzmGuQGk5NLDjBYe-0d3hRB06MMB0VRswUb5tXR2Idvi591ghJiCeG7tBZLcqnbFUoGpPXlEDFI_NY0lPi5VmXJKEO6uqjgsdI8YTLuXTbqJWEsVDWrhTZXWmNzvUZrSMxRplBpMtDo7hQ3I4Hz1O9MgVc2J2KO5NsQbluGfPsDiHh7JfEj77TLM4"/>
                    <div class="absolute -bottom-2 -right-2 bg-primary text-on-primary p-2 rounded-lg shadow-lg">
                        <span class="material-symbols-outlined text-sm">edit</span>
                    </div>
                </div>
                <div class="flex flex-col gap-sm">
                    <div class="flex gap-md js-requires-write">
                        <button class="bg-primary-container text-on-primary-container px-lg py-sm rounded-lg font-label-md text-label-md hover:opacity-90 transition-opacity">Upload</button>
                        <button class="bg-surface-container-high text-on-surface-variant px-lg py-sm rounded-lg font-label-md text-label-md hover:bg-surface-container-highest transition-colors">Remove</button>
                    </div>
                    <p class="font-body-sm text-body-sm text-on-surface-variant mt-2">Recommended: Square JPG or PNG, at least 400x400px.</p>
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
                <div class="space-y-xs">
                    <label class="font-label-md text-label-md text-on-surface-variant">Full Name</label>
                    <input class="w-full bg-surface border border-outline-variant rounded-lg p-md focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" type="text" id="settings-name" value="Guest User"/>
                </div>
                <div class="space-y-xs">
                    <label class="font-label-md text-label-md text-on-surface-variant">Email Address</label>
                    <input class="w-full bg-surface border border-outline-variant rounded-lg p-md focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" type="email" id="settings-email" value=""/>
                </div>
                <div class="space-y-xs">
                    <label class="font-label-md text-label-md text-on-surface-variant">Contact Number</label>
                    <input class="w-full bg-surface border border-outline-variant rounded-lg p-md focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" type="tel" value="+63 912 345 6789"/>
                </div>
                <div class="space-y-xs">
                    <label class="font-label-md text-label-md text-on-surface-variant">Preferred Language</label>
                    <select class="w-full bg-surface border border-outline-variant rounded-lg p-md focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all appearance-none cursor-pointer">
                        <option>English (US)</option>
                        <option>English (UK)</option>
                        <option>Filipino</option>
                        <option>Korean</option>
                        <option>Mandarin</option>
                    </select>
                </div>
            </div>
            <div class="mt-xl pt-lg border-t border-outline-variant flex justify-end js-requires-write">
                <button class="bg-primary text-on-primary px-xl py-md rounded-lg font-label-md text-label-md hover:opacity-95 shadow-md active:scale-95 transition-all">Save Changes</button>
            </div>
        </div>
    </section>

    <section class="app-tab-panel is-tab-hidden hidden space-y-lg" data-guest-panel="notifications" role="tabpanel">
        <div class="bg-surface-container-lowest rounded-lg soft-shadow p-lg border border-outline-variant/30">
            <h3 class="font-headline-sm text-headline-sm mb-lg">Notification Preferences</h3>
            <div class="space-y-md">
                <div class="flex items-center justify-between p-md rounded-lg hover:bg-surface-container-low transition-colors">
                    <div>
                        <p class="font-label-md text-label-md">Email Notifications</p>
                        <p class="font-body-sm text-body-sm text-on-surface-variant">Receive reservation confirmations via email.</p>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input checked="" class="sr-only peer" type="checkbox"/>
                        <div class="w-11 h-6 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
                    </label>
                </div>
            </div>
        </div>
    </section>

    <section class="app-tab-panel is-tab-hidden hidden space-y-lg" data-guest-panel="security" role="tabpanel">
        <div class="bg-surface-container-lowest rounded-lg soft-shadow p-lg border border-outline-variant/30">
            <h3 class="font-headline-sm text-headline-sm mb-lg">Password & Authentication</h3>
            <div class="space-y-lg mb-xl">
                <div class="grid grid-cols-1 gap-lg max-w-md">
                    <div class="space-y-xs">
                        <label class="font-label-md text-label-md text-on-surface-variant" for="current-password">Current Password</label>
                        <input id="current-password" class="w-full bg-surface border border-outline-variant rounded-lg p-md focus:ring-2 focus:ring-primary/20 outline-none transition-all" placeholder="••••••••" type="password" />
                    </div>
                    <div class="space-y-xs">
                        <label class="font-label-md text-label-md text-on-surface-variant" for="new-password">New Password</label>
                        <input id="new-password" class="w-full bg-surface border border-outline-variant rounded-lg p-md focus:ring-2 focus:ring-primary/20 outline-none transition-all" placeholder="Min. 6 characters" type="password" />
                    </div>
                    <div class="space-y-xs">
                        <label class="font-label-md text-label-md text-on-surface-variant" for="confirm-new-password">Confirm New Password</label>
                        <input id="confirm-new-password" class="w-full bg-surface border border-outline-variant rounded-lg p-md focus:ring-2 focus:ring-primary/20 outline-none transition-all" placeholder="Repeat new password" type="password" />
                    </div>
                </div>
                <div id="password-feedback" class="hidden text-body-sm rounded-lg px-3 py-2"></div>
                <button id="update-password-btn" class="js-requires-write bg-primary-container text-on-primary-container px-lg py-md rounded-lg font-label-md text-label-md hover:opacity-90">Update Password</button>
            </div>
        </div>
    </section>
    </div>
    </div>
</div>

<footer class="border-t border-outline-variant bg-surface-container-lowest py-8 px-margin-mobile md:px-gutter mt-10">
    <div class="max-w-container-max mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-2">
            <span class="font-headline-sm text-primary">AptSpace</span>
            <span class="text-on-surface-variant text-body-sm">© 2026 Asia Pacific Theological Seminary</span>
        </div>
        <div class="flex gap-6">
            <a class="text-body-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Privacy Policy</a>
            <a class="text-body-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Terms of Service</a>
            <a class="text-body-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Contact Support</a>
        </div>
    </div>
</footer>
</div>

<script type="module">
  import { requireAuth, getCurrentUser, applyRoleUI } from '/assets/js/services/auth.js';
  import { initAppLayout } from '/assets/js/layout/ui.js';
  import { initTabGroup } from '/assets/js/layout/tabs.js';

  requireAuth();
  await initAppLayout({
    portal: 'guest',
    activePage: 'settings',
    title: 'Settings',
    subtitle: 'Guest Portal',
  });

  const user = getCurrentUser();
  if (user) {
    const nameEl = document.getElementById('settings-name');
    const emailEl = document.getElementById('settings-email');
    if (nameEl) nameEl.value = user.full_name || user.name || '';
    if (emailEl) emailEl.value = user.email || '';
  }

  const { readOnly } = applyRoleUI();
  if (readOnly) {
    document.querySelectorAll('[data-guest-panel="profile"] input, [data-guest-panel="profile"] select, [data-guest-panel="security"] input')
      .forEach((el) => { el.setAttribute('disabled', 'disabled'); });
  }

  initTabGroup({
    tabAttr: 'data-guest-tab',
    panelAttr: 'data-guest-panel',
    tabsSelector: '[role="tablist"]',
    panelsSelector: '.app-tab-panels',
    useHiddenClass: true,
  });

  document.getElementById('update-password-btn')?.addEventListener('click', async () => {
    const currentPw  = document.getElementById('current-password')?.value.trim();
    const newPw      = document.getElementById('new-password')?.value.trim();
    const confirmPw  = document.getElementById('confirm-new-password')?.value.trim();
    const feedback   = document.getElementById('password-feedback');
    const btn        = document.getElementById('update-password-btn');

    const showMsg = (msg, isError) => {
      if (!feedback) return;
      feedback.textContent = msg;
      feedback.className = isError
        ? 'text-body-sm rounded-lg px-3 py-2 bg-error/10 text-error'
        : 'text-body-sm rounded-lg px-3 py-2 bg-emerald-50 text-emerald-700';
      feedback.classList.remove('hidden');
    };

    if (!currentPw || !newPw || !confirmPw) return showMsg('All password fields are required.', true);
    if (newPw.length < 6)                   return showMsg('New password must be at least 6 characters.', true);
    if (newPw !== confirmPw)                return showMsg('New passwords do not match.', true);

    btn.disabled = true;
    btn.textContent = 'Saving…';
    try {
      const res = await fetch('/api/auth/me/password', {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${localStorage.getItem('token')}`,
        },
        body: JSON.stringify({ current_password: currentPw, new_password: newPw }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Update failed');
      showMsg(data.message || 'Password updated.', false);
      ['current-password', 'new-password', 'confirm-new-password'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
    } catch (err) {
      showMsg(err.message, true);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Update Password';
    }
  });
</script>
</body>
</html>
