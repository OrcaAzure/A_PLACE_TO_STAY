<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Account | APTSpace Guest</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="/assets/js/config/tailwind-theme-base.js"></script>
    <script src="/assets/js/config/tailwind-guest.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/assets/css/global/landing.css"/>
    <link rel="stylesheet" href="/assets/css/global/guest-portal.css"/>
    <link rel="stylesheet" href="/assets/css/global/main.css" />
    <link rel="stylesheet" href="/assets/css/components/components.css" />
    <link rel="stylesheet" href="/assets/css/global/responsive.css" />
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .soft-shadow { box-shadow: 0px 1px 3px rgba(0,0,0,0.1); }
        /* Guest settings: content is short — no inner scroll on desktop */
        .guest-settings-workspace {
            flex: 0 1 auto;
        }
        .guest-settings-workspace .app-tab-panels {
            flex: none;
            min-height: 0;
            overflow: visible;
        }
        @media (max-width: 639px) {
            .guest-settings-workspace .app-tab-panels {
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
            }
        }
        .guest-settings-footer {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: flex-start;
            gap: 0.75rem;
            margin-top: 1.5rem;
            padding-top: 1.25rem;
            border-top: 1px solid var(--color-outline-variant, #cbd5e0);
        }
        .guest-shell .guest-settings-workspace .btn-primary,
        .guest-shell #app-modal .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            min-height: 2.75rem;
            padding: 0.625rem 1.25rem;
            font-size: 0.9375rem;
            font-weight: 700;
            background: var(--color-primary, #1A365D);
            color: #fff;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background 0.15s, box-shadow 0.15s;
        }
        .guest-shell .guest-settings-workspace .btn-primary:hover,
        .guest-shell #app-modal .btn-primary:hover {
            background: var(--color-primary-container, #2C5282);
            box-shadow: 0 2px 8px rgba(26, 54, 93, 0.2);
        }
    </style>
</head>
<body>

<div id="page-content">
    <div class="app-tab-workspace guest-settings-workspace bg-surface-container-lowest rounded-lg soft-shadow border border-outline-variant/30 max-w-full">
    <div class="app-tabs px-lg pt-md" role="tablist" aria-label="Settings sections">
        <button type="button" role="tab" data-guest-tab="profile" class="app-tab-btn app-tab-active" aria-selected="true">Profile</button>
        <button type="button" role="tab" data-guest-tab="security" class="app-tab-btn" aria-selected="false">Security</button>
    </div>

    <div class="app-tab-panels">
    <section class="app-tab-panel space-y-lg" data-guest-panel="profile" role="tabpanel">
        <div class="bg-surface-container-lowest rounded-lg soft-shadow p-lg border border-outline-variant/30">
            <h3 class="font-headline-sm text-headline-sm mb-lg">Profile Information</h3>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
                <div class="space-y-xs">
                    <label class="font-label-md text-label-md text-on-surface-variant" for="settings-name">Full Name</label>
                    <input class="w-full bg-surface border border-outline-variant rounded-lg p-md focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" type="text" id="settings-name" value="Guest User"/>
                </div>
                <div class="space-y-xs">
                    <label class="font-label-md text-label-md text-on-surface-variant" for="settings-email">Email Address</label>
                    <input class="w-full bg-surface-container-low border border-outline-variant rounded-lg p-md text-on-surface-variant cursor-not-allowed outline-none" type="email" id="settings-email" value="" readonly aria-readonly="true" title="Email cannot be changed. Contact the housing office if you need to update it."/>
                    <p class="font-body-sm text-body-sm text-on-surface-variant">Managed by the housing office.</p>
                </div>
                <div class="space-y-xs max-w-xs">
                    <label class="font-label-md text-label-md text-on-surface-variant" for="settings-phone">Contact Number</label>
                    <input class="w-full bg-surface border border-outline-variant rounded-lg p-md focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" type="tel" id="settings-phone" placeholder="+63 912 345 6789" autocomplete="tel"/>
                </div>
            </div>
            <div class="guest-settings-footer js-requires-write">
                <button id="settings-save-btn" type="button" class="btn-primary">Save Changes</button>
                <div id="settings-feedback" class="hidden text-body-sm rounded-lg px-3 py-2"></div>
            </div>
        </div>
    </section>

    <section class="app-tab-panel is-tab-hidden hidden space-y-lg" data-guest-panel="security" role="tabpanel">
        <div class="bg-surface-container-lowest rounded-lg soft-shadow p-lg border border-outline-variant/30">
            <h3 class="font-headline-sm text-headline-sm mb-lg">Password & Authentication</h3>
            <div class="grid grid-cols-1 gap-lg max-w-md">
                <div class="space-y-xs">
                    <label class="font-label-md text-label-md text-on-surface-variant" for="current-password">Current Password</label>
                    <input id="current-password" class="w-full bg-surface border border-outline-variant rounded-lg p-md focus:ring-2 focus:ring-primary/20 outline-none transition-all" placeholder="••••••••" type="password" autocomplete="current-password" />
                </div>
                <div class="space-y-xs">
                    <label class="font-label-md text-label-md text-on-surface-variant" for="new-password">New Password</label>
                    <input id="new-password" class="w-full bg-surface border border-outline-variant rounded-lg p-md focus:ring-2 focus:ring-primary/20 outline-none transition-all" placeholder="Min. 6 characters" type="password" autocomplete="new-password" />
                </div>
                <div class="space-y-xs">
                    <label class="font-label-md text-label-md text-on-surface-variant" for="confirm-new-password">Confirm New Password</label>
                    <input id="confirm-new-password" class="w-full bg-surface border border-outline-variant rounded-lg p-md focus:ring-2 focus:ring-primary/20 outline-none transition-all" placeholder="Repeat new password" type="password" autocomplete="new-password" />
                </div>
            </div>
            <div class="guest-settings-footer js-requires-write">
                <button id="update-password-btn" type="button" class="btn-primary">Update Password</button>
                <div id="password-feedback" class="hidden text-body-sm rounded-lg px-3 py-2"></div>
            </div>
        </div>

        <div class="bg-surface-container-lowest rounded-lg soft-shadow p-lg border border-outline-variant/30 lg:hidden">
            <h3 class="font-headline-sm text-headline-sm mb-md">Session</h3>
            <p class="font-body-sm text-body-sm text-on-surface-variant mb-lg">Sign out of your guest account on this device.</p>
            <button type="button" data-action="guest-logout" class="w-full flex items-center justify-center gap-2 px-lg py-md rounded-lg border border-outline-variant text-on-surface-variant font-label-md text-label-md font-semibold hover:bg-surface-container-low transition-colors min-h-[3rem]">
                <span class="material-symbols-outlined text-[1.25rem]">logout</span>
                Log Out
            </button>
        </div>
    </section>
    </div>
    </div>
</div>

<script type="module">
  import { requireAuth, applyRoleUI } from '/assets/js/services/auth.js';
  import { initAppLayout } from '/assets/js/layout/ui.js';
  import { initTabGroup } from '/assets/js/layout/tabs.js';
  import { loadGuestSettings } from '/assets/js/features/guest-settings.js';

  if (!(await requireAuth())) throw new Error('Not authenticated');
  await initAppLayout({
    portal: 'guest',
    activePage: 'settings',
  });

  await loadGuestSettings();

  const { readOnly } = applyRoleUI();
  if (readOnly) {
    document.querySelectorAll('[data-guest-panel="profile"] input, [data-guest-panel="security"] input')
      .forEach((el) => { el.setAttribute('disabled', 'disabled'); });
  }

  initTabGroup({
    tabAttr: 'data-guest-tab',
    panelAttr: 'data-guest-panel',
    tabsSelector: '[role="tablist"]',
    panelsSelector: '.app-tab-panels',
    useHiddenClass: true,
  });
</script>
</body>
</html>
