<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Home | APTSpace Guest</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="/assets/js/config/tailwind-theme-base.js"></script>
    <script src="/assets/js/config/tailwind-guest.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/assets/css/global/landing.css"/>
    <link rel="stylesheet" href="/assets/css/global/guest-portal.css?v=guest-hero-sm5"/>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@dotlottie/player-component@2.7.12/dist/dotlottie-player.mjs" data-apt-dotlottie></script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
    </style>
</head>
<body>

<div id="page-content" class="guest-landing"></div>

<script type="module">
    import { requireAuth, applyRoleUI } from '/assets/js/services/auth.js';
    import { initAppLayout } from '/assets/js/layout/ui.js';
    import { initSplashIdle } from '/assets/js/layout/splash-idle.js';
    import { applyGuestLandingAccess } from '/assets/js/features/guest-booking-flow.js';

    await initSplashIdle({ portal: 'guest' });
    const authed = await requireAuth();
    if (authed) {
      try {
        await initAppLayout({
          portal: 'guest',
          activePage: 'dashboard',
          landingHome: true,
        });
        applyRoleUI();
        applyGuestLandingAccess(document.getElementById('page-content') || document);
      } catch (err) {
        // Prevent blank page if guest shell bootstrap fails.
        console.error('Guest dashboard bootstrap failed:', err);
        document.documentElement.classList.remove('admin-chrome-boot');
        const mount = document.getElementById('page-content') || document.body;
        mount.className = 'guest-app-page max-w-3xl mx-auto px-4 sm:px-6 py-16';
        mount.innerHTML = `
          <section class="rounded-2xl border border-outline-variant bg-white shadow-sm p-6 sm:p-8">
            <h1 class="text-headline-md font-bold text-primary mb-2">APTSpace is loading</h1>
            <p class="text-body-md text-on-surface-variant mb-4">
              We hit a temporary page error. Please refresh once, or open Browse directly.
            </p>
            <div class="flex flex-wrap gap-3">
              <a href="/guest/facilities.html" class="inline-flex items-center px-4 py-2.5 rounded-xl bg-primary text-white font-semibold no-underline">Open Browse</a>
              <a href="/login.html" class="inline-flex items-center px-4 py-2.5 rounded-xl border border-outline-variant text-on-surface font-medium no-underline">Go to Login</a>
            </div>
          </section>
        `;
      }
    }
</script>
</body>
</html>
