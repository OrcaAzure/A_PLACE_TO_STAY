<!DOCTYPE html>
<html class="h-full" lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Facilities | AptSpace Guest</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="/assets/js/config/tailwind-theme-base.js"></script>
<script src="/assets/js/config/tailwind-admin.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/global/main.css" />
<link rel="stylesheet" href="/assets/css/components/components.css" />
<link rel="stylesheet" href="/assets/css/global/responsive.css" />
<link rel="stylesheet" href="/assets/css/global/admin-accessibility.css" />
<link rel="stylesheet" href="/assets/css/global/guest-layout.css" />
<style>
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    .reveal { opacity: 0; animation: fadeInUp .45s cubic-bezier(.22,.61,.36,1) forwards; }
    .skeleton { background: #eef2f7; border-radius: 16px; animation: pulse 1.3s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .55; } }
    .chip { transition: all .2s ease; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
</style>
</head>
<body>

<div id="page-content">
<div class="max-w-container-max mx-auto flex flex-col gap-gutter">

  <div class="reveal">
    <h2 class="font-headline-xl text-headline-xl text-on-surface">Browse Rooms</h2>
    <p class="font-body-md text-body-md text-on-surface-variant">Check live availability and pricing for your dates, then reserve.</p>
  </div>

  <section class="bg-white rounded-2xl p-4 sm:p-6 border border-outline-variant shadow-sm reveal" style="animation-delay:.05s">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
      <div>
        <label class="block font-label-sm text-label-sm text-outline mb-2 uppercase tracking-wider">Check-in</label>
        <input id="filter-check-in" class="w-full border-outline-variant rounded-xl focus:ring-primary focus:border-primary px-4 py-3 bg-surface-container-low text-body-sm" type="date">
      </div>
      <div>
        <label class="block font-label-sm text-label-sm text-outline mb-2 uppercase tracking-wider">Check-out</label>
        <input id="filter-check-out" class="w-full border-outline-variant rounded-xl focus:ring-primary focus:border-primary px-4 py-3 bg-surface-container-low text-body-sm" type="date">
      </div>
      <div>
        <label class="block font-label-sm text-label-sm text-outline mb-2 uppercase tracking-wider">Guests</label>
        <input id="filter-guests" type="number" min="1" value="1" class="w-full border-outline-variant rounded-xl focus:ring-primary focus:border-primary px-4 py-3 bg-surface-container-low text-body-sm">
      </div>
      <div class="flex items-end">
        <button id="find-rooms" class="w-full bg-primary text-white px-6 py-3 rounded-xl font-label-md flex items-center justify-center gap-2 hover:brightness-110 transition-all shadow-md active:scale-[0.98]">
          <span class="material-symbols-outlined text-xl">search</span>
          Check availability
        </button>
      </div>
    </div>
    <div id="availability-note" class="hidden mt-4 flex items-center justify-between gap-3 text-body-sm">
      <span id="availability-text" class="text-on-surface-variant"></span>
      <button id="clear-dates" class="text-primary font-label-md hover:underline">Show all rooms</button>
    </div>
  </section>

  <div class="flex flex-col gap-3 reveal" style="animation-delay:.1s">
    <div class="flex flex-wrap items-center gap-2 w-full">
      <div class="flex items-center bg-surface-container-low px-4 py-2 rounded-full border border-outline-variant w-full sm:w-72 min-w-0 transition-all focus-within:border-primary focus-within:shadow-sm">
        <span class="material-symbols-outlined text-outline text-[20px]">search</span>
        <input id="room-search" class="bg-transparent border-none focus:ring-0 text-body-sm font-body-sm w-full" placeholder="Search rooms..." type="text"/>
      </div>
    </div>
    <div class="flex flex-wrap gap-2" id="building-filters"></div>
    <div class="flex flex-wrap items-center gap-2">
      <span class="text-label-sm text-outline uppercase tracking-wider mr-1">Type:</span>
      <div class="flex flex-wrap gap-2" id="type-filters"></div>
    </div>
  </div>

  <div id="rooms-mount" class="space-y-10">
    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
      <div class="skeleton h-64"></div>
      <div class="skeleton h-64"></div>
      <div class="skeleton h-64"></div>
    </div>
  </div>

  <div class="reveal" style="animation-delay:.15s">
    <h2 class="font-headline-xl text-headline-xl text-on-surface">Browse Venues</h2>
    <p class="font-body-md text-body-md text-on-surface-variant">Book a seminar hall, chapel, or meeting space for your event.</p>
  </div>

  <div id="venues-mount" class="space-y-10 reveal" style="animation-delay:.2s">
    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
      <div class="skeleton h-48"></div>
      <div class="skeleton h-48"></div>
      <div class="skeleton h-48"></div>
    </div>
  </div>

</div>

<!-- Venue Booking Modal -->
<div id="venue-booking-modal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/40">
  <div class="bg-white w-full sm:max-w-md rounded-t-2xl sm:rounded-2xl shadow-2xl p-6 space-y-4">
    <div class="flex items-center justify-between">
      <h3 class="font-headline-sm text-on-surface" id="vbm-title">Book Venue</h3>
      <button id="vbm-close" type="button" class="text-on-surface-variant hover:text-on-surface">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <input type="hidden" id="vbm-facility-id" />

    <div class="space-y-3">
      <div>
        <label class="text-label-sm text-on-surface-variant block mb-1" for="vbm-date">Event Date</label>
        <input type="date" id="vbm-date" class="w-full border border-outline-variant rounded-lg px-3 py-2.5 text-body-sm" />
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-label-sm text-on-surface-variant block mb-1" for="vbm-start">Start Time</label>
          <input type="time" id="vbm-start" class="w-full border border-outline-variant rounded-lg px-3 py-2.5 text-body-sm" />
        </div>
        <div>
          <label class="text-label-sm text-on-surface-variant block mb-1" for="vbm-end">End Time</label>
          <input type="time" id="vbm-end" class="w-full border border-outline-variant rounded-lg px-3 py-2.5 text-body-sm" />
        </div>
      </div>
      <div>
        <label class="text-label-sm text-on-surface-variant block mb-1" for="vbm-guests">Number of guests</label>
        <input type="number" id="vbm-guests" min="1" value="1" class="w-full border border-outline-variant rounded-lg px-3 py-2.5 text-body-sm" />
      </div>
      <div>
        <label class="text-label-sm text-on-surface-variant block mb-1" for="vbm-notes">Notes (optional)</label>
        <textarea id="vbm-notes" rows="2" class="w-full border border-outline-variant rounded-lg px-3 py-2.5 text-body-sm" placeholder="Purpose, special requirements…"></textarea>
      </div>
    </div>

    <div id="vbm-feedback" class="hidden text-body-sm rounded-lg px-3 py-2"></div>

    <div class="flex gap-3 pt-1">
      <button type="button" id="vbm-cancel-btn"
        class="flex-1 border border-outline-variant rounded-lg py-2.5 text-body-sm text-on-surface hover:bg-surface-container-low">
        Cancel
      </button>
      <button type="button" id="vbm-submit-btn"
        class="flex-1 bg-primary text-white rounded-lg py-2.5 text-body-sm font-medium hover:opacity-90 disabled:opacity-50">
        Submit Request
      </button>
    </div>
  </div>
</div>

<footer class="border-t border-outline-variant bg-surface-container-lowest py-8 px-margin-mobile md:px-gutter mt-10 w-full">
<div class="max-w-container-max mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
<div class="flex items-center gap-2">
<span class="font-headline-sm text-primary">AptSpace</span>
<span class="text-on-surface-variant text-body-sm">© 2026 Asia Pacific Theological Seminary</span>
</div>
<div class="flex gap-6">
<a class="text-body-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="text-body-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="text-body-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Contact Support</a>
</div>
</div>
</footer>
</div>

<script type="module">
  import { requireAuth, applyRoleUI } from '/assets/js/services/auth.js';
  import { initAppLayout } from '/assets/js/layout/ui.js';
  import { getRooms, getRoomAvailability, normalizeRoom, getVenueFacilities, createFacilityBooking } from '/assets/js/services/api.js';

  requireAuth();
  await initAppLayout({
    portal: 'guest',
    activePage: 'facilities',
    title: 'Facilities',
    subtitle: 'Guest Portal',
  });

  const BLOCKED_BUILDINGS = ['House'];
  const isBlocked = (n) => BLOCKED_BUILDINGS.includes(String(n || '').trim());

  const { readOnly } = applyRoleUI();

  const todayStr = new Date().toISOString().slice(0, 10);
  const peso = (n) => `₱${Number(n || 0).toLocaleString('en-PH', { minimumFractionDigits: 2 })}`;

  const TYPE_ICON = {
    'Dorm': 'bed',
    'Superior Guest Room': 'king_bed',
    'Standard Apartment': 'apartment',
    'Deluxe 2 BR': 'meeting_room',
    'Deluxe 3 BR': 'meeting_room',
  };

  let allRooms = [];          // normalized rooms (House excluded)
  let availability = null;    // Map<roomId, availInfo> when a date search is active
  let filters = { building: '', type: '', search: '' };

  function statusInfo(room) {
    // When a date range is searched, use availability_status; otherwise room.status.
    if (availability) {
      const a = availability.get(room.id);
      const map = {
        available: { label: 'Available', cls: 'bg-emerald-500 text-white', bookable: true },
        booked: { label: 'Booked', cls: 'bg-slate-600 text-white', bookable: false },
        too_small: { label: 'Too Small', cls: 'bg-amber-500 text-white', bookable: false },
        maintenance: { label: 'Maintenance', cls: 'bg-red-500 text-white', bookable: false },
      };
      return map[a?.availability_status] || map.booked;
    }
    const map = {
      Available: { label: 'Available', cls: 'bg-emerald-500 text-white', bookable: true },
      Occupied: { label: 'Occupied', cls: 'bg-slate-600 text-white', bookable: false },
      Maintenance: { label: 'Maintenance', cls: 'bg-red-500 text-white', bookable: false },
    };
    return map[room.status] || map.Occupied;
  }

  function priceFor(room) {
    if (!availability) return null;
    const a = availability.get(room.id);
    if (!a) return null;
    return { perNight: a.price_per_night, total: a.estimated_total, nights: a.nights };
  }

  function renderFilters() {
    const buildings = [...new Set(allRooms.map((r) => r.building))].sort();
    const types = [...new Set(allRooms.map((r) => r.roomType))].sort();

    const chip = (active, label, attr) =>
      `<button data-${attr}="${label === 'All' ? '' : label}" class="chip px-4 py-1.5 rounded-full font-medium text-label-md ${active ? 'bg-primary text-white shadow-md' : 'bg-surface-container-low border border-outline-variant text-on-surface-variant hover:bg-surface-container'}">${label}</button>`;

    document.getElementById('building-filters').innerHTML =
      chip(filters.building === '', 'All', 'building') +
      buildings.map((b) => chip(filters.building === b, b, 'building')).join('');

    document.getElementById('type-filters').innerHTML =
      chip(filters.type === '', 'All', 'type') +
      types.map((t) => chip(filters.type === t, t, 'type')).join('');
  }

  function applyFilters() {
    const q = filters.search.trim().toLowerCase();
    return allRooms.filter((r) => {
      if (filters.building && r.building !== filters.building) return false;
      if (filters.type && r.roomType !== filters.type) return false;
      if (q && !`${r.building} ${r.roomNumber} ${r.roomType}`.toLowerCase().includes(q)) return false;
      return true;
    });
  }

  function roomCard(room) {
    const st = statusInfo(room);
    const price = priceFor(room);
    const icon = TYPE_ICON[room.roomType] || 'meeting_room';
    const priceBadge = price && price.total != null
      ? `<div class="absolute top-3 right-3 bg-white/90 text-primary px-3 py-1 rounded-full text-[12px] font-bold shadow">${peso(price.total)}</div>`
      : '';
    const priceLine = price && price.perNight != null
      ? `<p class="text-body-sm text-on-surface-variant mb-4">${peso(price.perNight)} / night · ${price.nights} night(s)</p>`
      : '<div class="mb-4"></div>';
    let reserveBtn;
    if (readOnly) {
      reserveBtn = `<div class="mt-auto w-full py-3 text-center bg-surface-container-low text-outline border border-outline-variant/50 rounded-xl font-bold text-label-md flex items-center justify-center gap-1.5"><span class="material-symbols-outlined text-[18px]">visibility</span>View only</div>`;
    } else if (st.bookable) {
      reserveBtn = `<a href="./reservations.html" class="mt-auto block text-center w-full py-3 bg-primary text-white rounded-xl font-bold text-label-md hover:brightness-110 transition-all shadow-md active:scale-95">Reserve</a>`;
    } else {
      reserveBtn = `<button disabled class="mt-auto w-full py-3 bg-surface-container-low text-outline border border-outline-variant/50 rounded-xl font-bold text-label-md cursor-not-allowed">${st.label}</button>`;
    }
    return `
      <div class="group flex flex-col bg-white rounded-2xl overflow-hidden border border-outline-variant hover:border-primary/40 hover:shadow-xl transition-all duration-300 reveal">
        <div class="relative h-28 bg-gradient-to-br from-primary/15 to-primary/5 flex items-center justify-center">
          <span class="material-symbols-outlined text-[44px] text-primary/70">${icon}</span>
          <div class="absolute top-3 left-3">
            <span class="${st.cls} px-3 py-1 rounded-full text-[11px] font-bold uppercase tracking-widest shadow">${st.label}</span>
          </div>
          ${priceBadge}
        </div>
        <div class="p-5 flex flex-col flex-1">
          <div class="flex justify-between items-start mb-1">
            <h3 class="text-2xl font-bold text-on-surface">${room.roomNumber}</h3>
            <div class="flex items-center gap-1.5 text-on-surface-variant bg-surface-container px-2.5 py-1 rounded-lg">
              <span class="material-symbols-outlined text-[18px]">group</span>
              <span class="font-label-sm font-semibold">${room.capacityMin}-${room.capacityMax}</span>
            </div>
          </div>
          <p class="text-body-sm text-on-surface-variant">${room.building}</p>
          <p class="text-label-sm text-primary font-medium mb-3">${room.roomType}</p>
          ${priceLine}
          ${reserveBtn}
        </div>
      </div>`;
  }

  function render() {
    const mount = document.getElementById('rooms-mount');
    const rooms = applyFilters();
    if (!rooms.length) {
      mount.innerHTML = `<div class="text-center py-16 text-on-surface-variant"><span class="material-symbols-outlined text-[48px] mb-2 block">search_off</span><p>No rooms match your filters.</p></div>`;
      return;
    }
    // Group by building
    const groups = {};
    rooms.forEach((r) => { (groups[r.building] = groups[r.building] || []).push(r); });
    mount.innerHTML = Object.keys(groups).sort().map((building) => `
      <div class="space-y-5">
        <div class="flex items-center gap-4">
          <h4 class="font-headline-sm text-on-surface-variant whitespace-nowrap">${building}</h4>
          <span class="text-label-sm text-outline">${groups[building].length} room(s)</span>
          <div class="h-[1px] w-full bg-outline-variant/30"></div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
          ${groups[building].map(roomCard).join('')}
        </div>
      </div>`).join('');
  }

  async function loadRooms() {
    try {
      const rooms = await getRooms();
      allRooms = rooms
        .map((r) => ({ ...normalizeRoom(r), capacityMin: r.capacity_min, capacityMax: r.capacity_max }))
        .filter((r) => !isBlocked(r.building));
      renderFilters();
      render();
    } catch (err) {
      document.getElementById('rooms-mount').innerHTML =
        `<div class="text-center py-16 text-error"><span class="material-symbols-outlined text-[40px] mb-2 block">error</span><p>${err.message}</p></div>`;
    }
  }

  async function checkAvailability() {
    const checkIn = document.getElementById('filter-check-in').value;
    const checkOut = document.getElementById('filter-check-out').value;
    const guests = Number(document.getElementById('filter-guests').value) || 1;
    const note = document.getElementById('availability-note');
    const noteText = document.getElementById('availability-text');

    if (!checkIn || !checkOut) {
      note.classList.remove('hidden');
      noteText.textContent = 'Please choose both check-in and check-out dates.';
      return;
    }
    if (new Date(checkOut) <= new Date(checkIn)) {
      note.classList.remove('hidden');
      noteText.textContent = 'Check-out must be after check-in.';
      return;
    }

    const btn = document.getElementById('find-rooms');
    btn.disabled = true;
    btn.innerHTML = '<span class="material-symbols-outlined text-xl animate-spin">progress_activity</span> Checking…';
    try {
      const data = await getRoomAvailability({ check_in: checkIn, check_out: checkOut, guest_count: guests });
      availability = new Map((data.rooms || []).map((r) => [r.id, r]));
      const avail = (data.rooms || []).filter((r) => r.availability_status === 'available' && !isBlocked(r.building_name)).length;
      note.classList.remove('hidden');
      noteText.textContent = `${avail} room(s) available for ${checkIn} → ${checkOut} · ${guests} guest(s). Pricing shown below.`;
      render();
    } catch (err) {
      note.classList.remove('hidden');
      noteText.textContent = err.message || 'Could not check availability.';
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<span class="material-symbols-outlined text-xl">search</span> Check availability';
    }
  }

  function clearDates() {
    availability = null;
    document.getElementById('filter-check-in').value = '';
    document.getElementById('filter-check-out').value = '';
    document.getElementById('availability-note').classList.add('hidden');
    render();
  }

  document.getElementById('find-rooms').addEventListener('click', checkAvailability);
  document.getElementById('clear-dates').addEventListener('click', clearDates);
  document.getElementById('filter-check-in').min = todayStr;
  document.getElementById('filter-check-out').min = todayStr;

  document.getElementById('building-filters').addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-building]');
    if (!btn) return;
    filters.building = btn.dataset.building;
    renderFilters();
    render();
  });
  document.getElementById('type-filters').addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-type]');
    if (!btn) return;
    filters.type = btn.dataset.type;
    renderFilters();
    render();
  });

  let searchTimer;
  document.getElementById('room-search').addEventListener('input', (e) => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { filters.search = e.target.value; render(); }, 200);
  });

  loadRooms();

  // ---- Venue section ----
  function escapeHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function venueCard(item) {
    const rate = item.rate != null ? `₱${Number(item.rate).toLocaleString('en-PH', { minimumFractionDigits: 2 })} / hr` : '—';
    return `
      <div class="flex flex-col bg-white rounded-2xl overflow-hidden border border-outline-variant hover:border-primary/40 hover:shadow-xl transition-all duration-300 reveal">
        <div class="h-24 bg-gradient-to-br from-secondary/15 to-secondary/5 flex items-center justify-center">
          <span class="material-symbols-outlined text-[40px] text-secondary/70">corporate_fare</span>
        </div>
        <div class="p-5 flex flex-col flex-1">
          <p class="text-label-sm text-primary font-medium mb-1">${escapeHtml(item.category)}</p>
          <h3 class="font-headline-sm text-on-surface mb-1">${escapeHtml(item.item)}</h3>
          <p class="text-body-sm text-on-surface-variant mb-3">${rate}</p>
          ${!readOnly ? `<button type="button"
            class="book-venue-btn mt-auto w-full border border-primary text-primary rounded-lg py-2 text-label-sm hover:bg-primary hover:text-white transition-colors"
            data-facility-id="${item.id}"
            data-facility-name="${escapeHtml(item.item)}">
            Book this venue
          </button>` : `<div class="mt-auto w-full py-2 text-center bg-surface-container-low text-outline border border-outline-variant/50 rounded-lg text-label-sm">View only</div>`}
        </div>
      </div>`;
  }

  async function loadVenues() {
    const mount = document.getElementById('venues-mount');
    try {
      const venues = await getVenueFacilities();
      if (!venues.length) {
        mount.innerHTML = '<p class="text-body-sm text-on-surface-variant">No venues available.</p>';
        return;
      }
      const groups = {};
      venues.forEach(v => { (groups[v.category] = groups[v.category] || []).push(v); });
      mount.innerHTML = Object.keys(groups).sort().map(cat => `
        <div class="space-y-5">
          <div class="flex items-center gap-4">
            <h4 class="font-headline-sm text-on-surface-variant whitespace-nowrap">${escapeHtml(cat)}</h4>
            <div class="h-[1px] w-full bg-outline-variant/30"></div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
            ${groups[cat].map(venueCard).join('')}
          </div>
        </div>`).join('');
    } catch (err) {
      mount.innerHTML = `<div class="text-center py-8 text-error"><p>${err.message}</p></div>`;
    }
  }

  loadVenues();

  // ---- Venue booking modal ----
  const modal    = document.getElementById('venue-booking-modal');
  const titleEl  = document.getElementById('vbm-title');
  const fidEl    = document.getElementById('vbm-facility-id');
  const feedback = document.getElementById('vbm-feedback');
  const submitBtn= document.getElementById('vbm-submit-btn');

  function openVenueModal(facilityId, facilityName) {
    if (fidEl)   fidEl.value = facilityId;
    if (titleEl) titleEl.textContent = `Book — ${facilityName}`;
    const dateEl = document.getElementById('vbm-date');
    if (dateEl) dateEl.min = new Date().toISOString().slice(0, 10);
    feedback?.classList.add('hidden');
    modal?.classList.remove('hidden');
  }

  function closeVenueModal() {
    modal?.classList.add('hidden');
    ['vbm-date','vbm-start','vbm-end','vbm-notes'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    const guests = document.getElementById('vbm-guests');
    if (guests) guests.value = '1';
  }

  document.getElementById('vbm-close')?.addEventListener('click', closeVenueModal);
  document.getElementById('vbm-cancel-btn')?.addEventListener('click', closeVenueModal);
  modal?.addEventListener('click', (e) => { if (e.target === modal) closeVenueModal(); });

  document.addEventListener('click', (e) => {
    const btn = e.target.closest('.book-venue-btn');
    if (btn) openVenueModal(btn.dataset.facilityId, btn.dataset.facilityName);
  });

  submitBtn?.addEventListener('click', async () => {
    const showMsg = (msg, isError) => {
      if (!feedback) return;
      feedback.textContent = msg;
      feedback.className = isError
        ? 'text-body-sm rounded-lg px-3 py-2 bg-error/10 text-error'
        : 'text-body-sm rounded-lg px-3 py-2 bg-emerald-50 text-emerald-700';
      feedback.classList.remove('hidden');
    };

    const facilityId = document.getElementById('vbm-facility-id')?.value;
    const eventDate  = document.getElementById('vbm-date')?.value;
    const startTime  = document.getElementById('vbm-start')?.value;
    const endTime    = document.getElementById('vbm-end')?.value;
    const guestCount = Number(document.getElementById('vbm-guests')?.value || 1);
    const notes      = document.getElementById('vbm-notes')?.value.trim();

    if (!eventDate) return showMsg('Please select an event date.', true);
    if (!startTime || !endTime) return showMsg('Please set start and end times.', true);
    if (endTime <= startTime) return showMsg('End time must be after start time.', true);

    submitBtn.disabled    = true;
    submitBtn.textContent = 'Submitting…';

    try {
      await createFacilityBooking({ facility_id: facilityId, event_date: eventDate,
        start_time: startTime, end_time: endTime, guest_count: guestCount, notes });
      showMsg('Venue request submitted! You will be notified once it is approved.', false);
      submitBtn.textContent = 'Submitted';
      setTimeout(closeVenueModal, 2000);
    } catch (err) {
      showMsg(err.message || 'Submission failed. Please try again.', true);
      submitBtn.disabled    = false;
      submitBtn.textContent = 'Submit Request';
    }
  });
</script>
</body></html>
