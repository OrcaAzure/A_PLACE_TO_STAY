<div id="drawerOverlay" class="hidden fixed inset-0 bg-black/30 z-50"></div>
<aside id="managementDrawer" class="fixed top-0 right-0 h-full w-full max-w-md bg-white shadow-2xl z-[60] drawer-transition translate-x-full flex flex-col app-tab-workspace">
  <div class="p-5 border-b border-outline-variant flex items-center justify-between shrink-0">
    <div class="min-w-0">
      <p id="drawerID" class="text-body-sm font-bold text-primary uppercase tracking-widest">#APT-0000</p>
      <h3 id="drawerTitle" class="font-headline-sm text-on-surface mt-1 truncate">Reservation Details</h3>
    </div>
    <button id="drawer-close" type="button" class="p-2.5 min-h-[3rem] min-w-[3rem] flex items-center justify-center hover:bg-surface-variant/50 rounded-lg shrink-0" aria-label="Close drawer">
      <span class="material-symbols-outlined">close</span>
    </button>
  </div>
  <div class="app-tabs px-5 shrink-0" role="tablist" aria-label="Reservation drawer tabs">
    <button type="button" role="tab" data-drawer-tab="details" class="app-tab-btn app-tab-active" aria-selected="true">Details</button>
    <button type="button" role="tab" data-drawer-tab="history" class="app-tab-btn" aria-selected="false">History</button>
  </div>
  <div class="app-tab-panels flex-1 min-h-0 overflow-y-auto p-5">
    <div data-drawer-panel="details" class="app-tab-panel" id="drawerBody" role="tabpanel">
      <p class="text-body-sm text-on-surface-variant">Select a timeline item to view details.</p>
    </div>
    <div data-drawer-panel="history" class="app-tab-panel is-tab-hidden hidden" role="tabpanel">
      <p class="text-body-sm text-on-surface-variant">No history available.</p>
    </div>
  </div>
</aside>
