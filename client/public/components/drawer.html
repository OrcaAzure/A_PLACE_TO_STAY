<div id="drawerOverlay" class="hidden fixed inset-0 bg-black/30 z-50"></div>
<aside id="managementDrawer" class="fixed top-0 right-0 h-full w-full max-w-md bg-white shadow-2xl z-[60] drawer-transition translate-x-full flex flex-col">
  <div class="p-5 border-b border-outline-variant flex items-center justify-between shrink-0">
    <div>
      <p id="drawerID" class="text-[10px] font-bold text-primary uppercase tracking-widest">#APT-0000</p>
      <h3 id="drawerTitle" class="font-headline-sm text-on-surface mt-1">Reservation Details</h3>
    </div>
    <button id="drawer-close" type="button" class="p-2 hover:bg-surface-variant/50 rounded-lg" aria-label="Close">
      <span class="material-symbols-outlined">close</span>
    </button>
  </div>
  <div class="border-b border-outline-variant px-5 flex gap-4">
    <button type="button" data-tab="details" class="py-3 border-b-2 border-primary text-primary text-label-sm font-bold">Details</button>
    <button type="button" data-tab="history" class="py-3 border-b-2 border-transparent text-on-surface-variant text-label-sm font-medium">History</button>
    <button type="button" data-tab="actions" class="py-3 border-b-2 border-transparent text-on-surface-variant text-label-sm font-medium">Actions</button>
  </div>
  <div class="flex-1 overflow-y-auto p-5">
    <div data-tab-content="details" id="drawerBody">
      <p class="text-body-sm text-on-surface-variant">Select a timeline item to view details.</p>
    </div>
    <div data-tab-content="history" class="hidden">
      <p class="text-body-sm text-on-surface-variant">No history available.</p>
    </div>
    <div data-tab-content="actions" class="hidden">
      <div class="space-y-3">
        <button id="drawer-approve-btn" type="button" class="w-full py-2.5 bg-primary text-on-primary rounded-lg font-label-md disabled:opacity-50 disabled:cursor-not-allowed">Approve</button>
        <button id="drawer-reject-btn" type="button" class="w-full py-2.5 border border-outline-variant rounded-lg font-label-md text-on-surface-variant disabled:opacity-50 disabled:cursor-not-allowed">Reject</button>
        <p id="drawer-action-feedback" class="hidden text-body-sm mt-2"></p>
      </div>
    </div>
  </div>
</aside>
