<header class="admin-app-header anim-static shrink-0 z-30">
  <div class="admin-app-header__inner">
    <div class="admin-app-header__start">
      <div class="admin-app-header__lead min-w-0">
        <div class="admin-page-heading">
          <h2 class="admin-page-title">{{TITLE}}</h2>
          <p class="admin-page-subtitle">{{SUBTITLE}}</p>
        </div>
      </div>
    </div>
    <div class="admin-app-header__actions shrink-0">
      <div class="admin-readonly-banner js-readonly-banner hidden" role="status" aria-live="polite">
        <span class="material-symbols-outlined admin-readonly-banner__icon" aria-hidden="true">lock</span>
        <span class="admin-readonly-banner__text">Read-Only Mode</span>
      </div>
      <button id="notifications-btn" type="button" class="admin-header-icon-btn" aria-label="Notifications">
        <span class="material-symbols-outlined">notifications</span>
        <span class="admin-notif-dot hidden" aria-hidden="true"></span>
      </button>
      <div class="admin-user-menu">
        <button
          type="button"
          id="admin-user-menu-btn"
          class="admin-user-menu-btn"
          aria-expanded="false"
          aria-haspopup="true"
          aria-controls="admin-user-dropdown"
          aria-label="Account menu"
        >
          <div class="admin-user-chip__text hidden sm:block">
            <p class="admin-user-chip__name">{{USER_NAME}}</p>
            <p class="admin-user-chip__role">{{USER_ROLE}}</p>
          </div>
          <div class="admin-user-chip__avatar" aria-hidden="true">{{USER_INITIAL}}</div>
          <span class="material-symbols-outlined admin-user-menu-chevron hidden sm:block" aria-hidden="true">expand_more</span>
        </button>
        <div id="admin-user-dropdown" class="admin-user-dropdown hidden" role="menu">
          <div class="admin-user-dropdown__head">
            <p class="admin-user-chip__name">{{USER_NAME}}</p>
            <p class="admin-user-chip__role">{{USER_ROLE}}</p>
          </div>
          <button type="button" data-action="logout" class="admin-user-dropdown__item admin-user-dropdown__item--logout" role="menuitem">
            <span class="material-symbols-outlined" aria-hidden="true">logout</span>
            Log out
          </button>
        </div>
      </div>
    </div>
  </div>
</header>
