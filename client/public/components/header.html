<header class="admin-app-header anim-static shrink-0 z-30">
  <div class="admin-app-header__inner">
    <button id="sidebar-open-btn" type="button" class="admin-header-icon-btn sidebar-open-btn" aria-label="Open sidebar" aria-expanded="true" title="Open sidebar">
      <span class="material-symbols-outlined sidebar-open-btn__icon">menu</span>
    </button>
    <div class="admin-app-header__start">
      <div class="admin-app-header__lead min-w-0">
        <div class="admin-page-heading">
          <h2 class="admin-page-title">{{TITLE}}</h2>
          <p class="admin-page-subtitle">{{SUBTITLE}}</p>
        </div>
      </div>
    </div>
    <div class="admin-app-header__actions shrink-0">
      <div class="admin-status-badge" title="System is running normally">
        <span class="admin-status-dot" aria-hidden="true"></span>
        <span>System Live</span>
      </div>
      <button id="notifications-btn" type="button" class="admin-header-icon-btn" aria-label="Notifications">
        <span class="material-symbols-outlined">notifications</span>
        <span class="admin-notif-dot" aria-hidden="true"></span>
      </button>
      <div class="admin-user-chip">
        <div class="admin-user-chip__text hidden sm:block">
          <p class="admin-user-chip__name">{{USER_NAME}}</p>
          <p class="admin-user-chip__role">{{USER_ROLE}}</p>
        </div>
        <div class="admin-user-chip__avatar" aria-hidden="true">{{USER_INITIAL}}</div>
      </div>
    </div>
  </div>
</header>
