<header class="h-16 border-b border-outline-variant flex justify-between items-center px-lg bg-white shrink-0 z-30">
  <div class="flex items-center gap-md">
    <h2 class="font-headline-sm text-on-surface">{{TITLE}}</h2>
    <div class="h-4 w-[1px] bg-outline-variant mx-2"></div>
    <p class="text-label-sm text-on-surface-variant uppercase tracking-wider font-bold">{{SUBTITLE}}</p>
  </div>
  <div class="flex items-center gap-md">
    <div class="flex items-center gap-2 bg-surface-container-low px-3 py-1.5 rounded-full border border-outline-variant/30">
      <span class="w-2 h-2 rounded-full bg-secondary animate-pulse"></span>
      <span class="text-[10px] font-bold text-on-surface-variant">SYSTEM LIVE</span>
    </div>
    <button id="notifications-btn" type="button" class="p-2 text-on-surface-variant hover:bg-surface-variant/50 rounded-full transition-colors relative" aria-label="Notifications">
      <span class="material-symbols-outlined">notifications</span>
      <span class="absolute top-2 right-2 w-2 h-2 bg-error rounded-full"></span>
    </button>
    <div class="flex items-center gap-sm pl-4 ml-2 border-l border-outline-variant/30">
      <div class="text-right hidden sm:block">
        <p class="text-label-sm font-semibold text-on-surface leading-none">{{USER_NAME}}</p>
        <p class="text-[10px] text-on-surface-variant uppercase font-bold tracking-tighter">{{USER_ROLE}}</p>
      </div>
      <div class="w-9 h-9 rounded-full ring-2 ring-primary/10 bg-primary/10 flex items-center justify-center text-primary font-bold text-sm">
        {{USER_INITIAL}}
      </div>
    </div>
  </div>
</header>
