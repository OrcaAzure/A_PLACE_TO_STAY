<div id="group-wizard-overlay" class="hidden fixed inset-0 bg-black/40 z-[95]"></div>
<div id="group-wizard-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-6" role="dialog" aria-modal="true">
  <div class="res-modal res-modal--wizard bg-white rounded-xl w-full flex flex-col max-h-[92vh]">
    <header class="res-modal-header">
      <div>
        <h2 id="group-wizard-title" class="res-modal-title">Group Reservation</h2>
        <p id="group-wizard-subtitle" class="res-hint">Step-by-step guide</p>
      </div>
      <button id="group-wizard-close" type="button" class="res-icon-btn" aria-label="Close"><span class="material-symbols-outlined">close</span></button>
    </header>
    <div id="group-wizard-steps" class="res-steps"></div>
    <div id="group-wizard-body" class="res-modal-body res-wizard-body"></div>
    <footer class="res-modal-footer res-wizard-footer">
      <p id="group-wizard-error" class="res-error hidden"></p>
      <div class="res-actions-row">
        <button type="button" id="group-wizard-back" class="res-btn res-btn--ghost hidden">Back</button>
        <button type="button" id="group-wizard-next" class="res-btn res-btn--primary">Next Step</button>
        <button type="button" id="group-wizard-confirm" class="res-btn res-btn--primary hidden">Save Group</button>
      </div>
    </footer>
  </div>
</div>
