<div id="manage-venues-overlay" class="hidden fixed inset-0 bg-black/40 z-[70]" aria-hidden="true"></div>
<div
  id="manage-venues-modal"
  class="hidden fixed inset-0 z-[80] flex items-center justify-center p-4"
  role="dialog"
  aria-modal="true"
  aria-labelledby="manage-venues-title"
  aria-hidden="true"
>
  <div class="admin-crud-shell bg-white rounded-xl w-full max-w-5xl border border-outline-variant flex flex-col max-h-[90vh]">
    <header class="px-5 py-4 border-b border-outline-variant flex items-start justify-between gap-4 shrink-0 bg-gradient-to-r from-secondary/5 to-transparent">
      <div class="flex items-start gap-3 min-w-0">
        <div class="w-11 h-11 bg-secondary text-white rounded-xl flex items-center justify-center shrink-0 shadow-sm">
          <span class="material-symbols-outlined">stadium</span>
        </div>
        <div class="min-w-0">
          <h2 id="manage-venues-title" class="font-headline-sm text-on-surface">Manage Venues</h2>
          <p class="text-body-sm text-on-surface-variant mt-0.5">Set up the space itself. Manage its uses and prices under the Venue prices tab.</p>
        </div>
      </div>
      <button id="manage-venues-close" type="button" class="p-2 hover:bg-surface-variant/50 rounded-lg shrink-0" aria-label="Close">
        <span class="material-symbols-outlined">close</span>
      </button>
    </header>

    <div class="px-5 py-3 border-b border-outline-variant shrink-0 bg-surface-container-low/30">
      <div class="flex flex-wrap items-center gap-3">
        <div class="relative flex-1 min-w-[180px]">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px] pointer-events-none">search</span>
          <input
            id="manage-venues-search"
            type="search"
            placeholder="Search by venue name or category…"
            class="w-full pl-10 pr-3 py-2.5 text-body-sm border border-outline-variant rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary"
            autocomplete="off"
          />
        </div>
        <button id="manage-venues-new" type="button" class="admin-crud-btn-primary shrink-0">
          <span class="material-symbols-outlined text-[20px]">add</span>
          Add Venue
        </button>
      </div>
    </div>

    <div id="manage-venues-body" class="admin-crud-body flex flex-1 min-h-0 relative">
      <div id="manage-venues-list-panel" class="admin-crud-list-panel w-full md:w-[38%] border-r border-outline-variant overflow-y-auto min-h-0 bg-surface-container-low/20">
        <div id="manage-venues-list" class="p-3 space-y-2" role="listbox" aria-label="Venue list"></div>
      </div>
      <div id="manage-venues-form-panel" class="admin-crud-form-panel flex-1 overflow-y-auto min-h-0">
        <div id="manage-venues-detail" class="p-5"></div>
      </div>
      <div id="manage-venues-loading" class="hidden loading-overlay rounded-b-xl"></div>
    </div>

    <footer class="px-5 py-4 border-t border-outline-variant flex flex-col sm:flex-row items-stretch sm:items-center justify-between gap-3 shrink-0 bg-surface-container-low/20">
      <div>
        <p id="manage-venues-footer-count" class="text-body-sm text-on-surface-variant">Showing 0 venues</p>
        <p id="manage-venues-feedback" class="hidden text-body-sm mt-1"></p>
      </div>
      <div id="manage-venues-footer-actions" class="flex flex-wrap gap-2 justify-end"></div>
    </footer>
  </div>
</div>
