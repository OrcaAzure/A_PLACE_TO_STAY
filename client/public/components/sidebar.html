<aside id="app-sidebar" class="anim-static bg-white border-r border-outline-variant flex flex-col py-lg px-md z-40 shrink-0 h-full">
  <div class="mb-xl px-sm flex items-center justify-between gap-sm min-w-0">
    <a href="{{BRAND_HREF}}" class="admin-brand flex items-center gap-md min-w-0 no-underline flex-1" aria-label="AptSpace home">
      <span class="admin-brand-mark" aria-hidden="true">A</span>
      <div class="admin-brand-text min-w-0">
        <h1 class="font-headline-md text-headline-md font-bold text-primary leading-tight truncate">AptSpace</h1>
        <p class="text-body-sm text-on-surface-variant mt-0.5 admin-portal-label truncate">{{PORTAL_LABEL}}</p>

      <span class="material-symbols-outlined text-[1.35rem] shrink-0">logout</span>
