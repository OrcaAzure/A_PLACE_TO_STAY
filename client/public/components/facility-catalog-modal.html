<div id="catalog-modal-overlay" class="hidden fixed inset-0 bg-black/40 z-[70]" aria-hidden="true"></div>
<div id="catalog-modal" class="hidden fixed inset-0 z-[75] flex items-center justify-center p-4 pointer-events-none" role="dialog" aria-modal="true" aria-labelledby="catalog-modal-title">
  <div class="admin-crud-shell bg-white rounded-xl w-full max-w-md max-h-[90vh] overflow-y-auto border border-slate-200 shadow-2xl pointer-events-auto">
    <div class="flex items-start justify-between gap-3 p-6 pb-0">
      <div>
        <h2 id="catalog-modal-title" class="text-xl font-bold text-slate-800">Edit Price</h2>
        <p class="text-sm text-slate-500 mt-1">Saved to the database — new reservations use this price right away.</p>
      </div>
      <button type="button" id="catalog-modal-close" class="p-2 text-slate-500 hover:bg-slate-100 rounded-lg shrink-0" aria-label="Close">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="p-6 pt-4">
      <div id="catalog-modal-feedback" class="hidden"></div>
      <div id="catalog-modal-fields"></div>
      <div class="flex flex-wrap gap-2 mt-6 pt-4 border-t border-slate-100">
        <button type="button" id="catalog-modal-delete" class="admin-crud-btn-danger hidden">Remove</button>
        <div class="flex-1"></div>
        <button type="button" id="catalog-modal-cancel" class="admin-crud-btn-ghost">Cancel</button>
        <button type="button" id="catalog-modal-save" class="admin-crud-btn-primary">Save changes</button>
      </div>
    </div>
  </div>
</div>
