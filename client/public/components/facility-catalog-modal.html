<div id="catalog-modal-overlay" class="catalog-modal-overlay hidden" aria-hidden="true"></div>
<div id="catalog-modal" class="catalog-modal hidden" role="dialog" aria-modal="true" aria-labelledby="catalog-modal-title">
  <div class="catalog-modal__panel admin-crud-shell">
    <div class="catalog-modal__head">
      <div class="catalog-modal__head-text">
        <h2 id="catalog-modal-title" class="catalog-modal__title">Edit Price</h2>
        <p class="catalog-modal__subtitle">Saved to the database — new reservations use this price right away.</p>
      </div>
      <button type="button" id="catalog-modal-close" class="catalog-modal__close" aria-label="Close">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="catalog-modal__body">
      <div id="catalog-modal-feedback" class="hidden"></div>
      <div id="catalog-modal-fields" class="catalog-modal__fields"></div>
      <div class="catalog-modal__actions">
        <button type="button" id="catalog-modal-delete" class="admin-crud-btn-danger hidden">Remove</button>
        <div class="catalog-modal__actions-spacer"></div>
        <button type="button" id="catalog-modal-cancel" class="admin-crud-btn-ghost">Cancel</button>
        <button type="button" id="catalog-modal-save" class="admin-crud-btn-primary">Save changes</button>
      </div>
    </div>
  </div>
</div>
