<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
  <button type="button" data-open-manage-requests class="res-action-card">
    <div class="res-action-card-icon res-action-card-icon--amber">
      <span class="material-symbols-outlined">inbox</span>
    </div>
    <div class="res-action-card-body">
      <h4>Guest Requests</h4>
      <p>See requests from guests. Approve to create a reservation, or reject with a note.</p>
    </div>
    <div class="res-action-card-foot">
      <span id="pending-count" class="res-action-badge res-action-badge--warn">0 PENDING</span>
      <span class="material-symbols-outlined">arrow_forward</span>
    </div>
  </button>
  <button type="button" data-open-manage-reservations class="res-action-card">
    <div class="res-action-card-icon res-action-card-icon--navy">
      <span class="material-symbols-outlined">event_available</span>
    </div>
    <div class="res-action-card-body">
      <h4>Reservations</h4>
      <p>Create, edit, or delete confirmed bookings. Add meals and extra fees step by step.</p>
    </div>
    <div class="res-action-card-foot">
      <span class="res-action-badge">MANAGE</span>
      <span class="material-symbols-outlined">arrow_forward</span>
    </div>
  </button>
</div>
