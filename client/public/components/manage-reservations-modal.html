<div id="manage-reservations-overlay" class="hidden fixed inset-0 bg-black/50 z-[70]"></div>
<div id="manage-reservations-modal" class="hidden fixed inset-0 z-[80] flex items-center justify-center p-4" role="dialog" aria-modal="true" aria-labelledby="manage-reservations-title">
  <div class="res-modal res-modal--cards bg-white rounded-xl w-full flex flex-col max-h-[92vh]">
    <header class="res-modal-header res-modal-header--cards">
      <div class="res-modal-header-main">
        <h2 id="manage-reservations-title" class="res-modal-title">Reservations</h2>
        <p class="res-lead res-lead--compact">View confirmed single stays and group bookings. Use <strong>New single</strong> or <strong>New group</strong> to create one, or <strong>Edit</strong> to update an existing stay.</p>
      </div>
      <button id="manage-reservations-close" type="button" class="res-icon-btn res-icon-btn--lg" aria-label="Close">
        <span class="material-symbols-outlined">close</span>
      </button>
    </header>

    <div class="res-modal-toolbar res-modal-toolbar--reservations">
      <div class="res-field">
        <label for="manage-reservations-search" class="res-field-label">Search</label>
        <input id="manage-reservations-search" type="search" class="res-input" placeholder="Guest, group, room, or ID…" />
      </div>
      <div class="res-field res-field--narrow">
        <label for="manage-reservations-status-filter" class="res-field-label">Show</label>
        <select id="manage-reservations-status-filter" class="res-input res-input--select">
          <option value="all">All reservations</option>
          <option value="active">Active now</option>
          <option value="upcoming">Upcoming</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>
      <div class="res-toolbar-create">
        <button type="button" data-open-create-reservation class="res-btn res-btn--secondary res-btn--wide">
          <span class="material-symbols-outlined">person</span> New single
        </button>
        <button type="button" data-open-create-group class="res-btn res-btn--primary res-btn--wide">
          <span class="material-symbols-outlined">groups</span> New group
        </button>
      </div>
    </div>

    <div class="res-modal-body res-modal-body--cards">
      <div id="manage-reservations-list" class="res-card-list" role="list"></div>
    </div>

    <footer class="res-modal-footer res-modal-footer--cards">
      <div class="res-modal-footer-left">
        <p id="manage-reservations-footer-count" class="res-footer-count">0 reservation(s)</p>
      </div>
      <button id="manage-reservations-close-btn" type="button" class="res-btn res-btn--secondary res-btn--wide">Close</button>
    </footer>
  </div>
</div>
