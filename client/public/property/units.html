<!DOCTYPE html>
<html class="h-full" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Units | AptSpace Property</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="../assets/js/tailwind-config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/responsive.css" />
</head>
<body>
  <div id="page-content">
    <section class="timeline-workspace min-h-[600px]">
      <div class="timeline-workspace-header">
        <div class="flex items-center gap-4"><div class="w-1.5 h-8 bg-primary rounded-full"></div><h3 class="font-headline-sm text-on-surface">Unit Directory</h3></div>
        <input type="search" placeholder="Search units..." class="border border-outline-variant rounded-lg px-3 py-2 text-body-sm w-64" />
      </div>
      <table class="data-table">
        <thead><tr><th>Unit</th><th>Type</th><th>Capacity</th><th>Status</th></tr></thead>
        <tbody>
          <tr><td class="font-medium">PCALM 201</td><td>Superior Guest Room</td><td>1–4</td><td><span class="status-pill-available text-[10px] px-2 py-0.5 rounded-full font-bold">Available</span></td></tr>
          <tr><td class="font-medium">PCALM 204</td><td>Superior Guest Room</td><td>1–4</td><td><span class="status-pill-maintenance text-[10px] px-2 py-0.5 rounded-full font-bold">Maintenance</span></td></tr>
          <tr><td class="font-medium">Thesda 101</td><td>Superior Guest Room</td><td>1–4</td><td><span class="status-pill-occupied text-[10px] px-2 py-0.5 rounded-full font-bold">Occupied</span></td></tr>
          <tr><td class="font-medium">House A</td><td>Standard Apartment</td><td>1–4</td><td><span class="status-pill-reserved text-[10px] px-2 py-0.5 rounded-full font-bold">Reserved</span></td></tr>
        </tbody>
      </table>
    </section>
  </div>
  <script type="module">
    import { initShell } from '../assets/js/shell.js';
    await initShell({ portal: 'property', active: 'units', title: 'Units', subtitle: 'Mission Control' });
  </script>
</body>
</html>
