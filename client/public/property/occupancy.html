<!DOCTYPE html>
<html class="h-full" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Occupancy | AptSpace Property</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="../assets/js/tailwind-config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/responsive.css" />
</head>
<body>
  <div id="page-content">
    <div class="kpi-grid mb-6">
      <div class="kpi-card"><div class="kpi-value">87%</div><div class="kpi-label">Overall Occupancy</div></div>
      <div class="kpi-card"><div class="kpi-value">98</div><div class="kpi-label">Occupied Units</div></div>
      <div class="kpi-card"><div class="kpi-value">15</div><div class="kpi-label">Available Units</div></div>
    </div>
    <section class="timeline-workspace">
      <div class="timeline-workspace-header">
        <div class="flex items-center gap-4"><div class="w-1.5 h-8 bg-primary rounded-full"></div><h3 class="font-headline-sm text-on-surface">Occupancy by Building</h3></div>
      </div>
      <table class="data-table">
        <thead><tr><th>Building</th><th>Occupancy</th><th>Occupied / Total</th><th>Trend</th></tr></thead>
        <tbody>
          <tr><td class="font-medium">PCALM</td><td>92%</td><td>38 / 42</td><td class="text-secondary font-bold">+2%</td></tr>
          <tr><td class="font-medium">Thesda</td><td>78%</td><td>22 / 28</td><td class="text-secondary font-bold">+5%</td></tr>
          <tr><td class="font-medium">House</td><td>85%</td><td>9 / 11</td><td>—</td></tr>
        </tbody>
      </table>
    </section>
  </div>
  <script type="module">
    import { initShell } from '../assets/js/shell.js';
    await initShell({ portal: 'property', active: 'occupancy', title: 'Occupancy', subtitle: 'Mission Control' });
  </script>
</body>
</html>
