<!DOCTYPE html>
<html class="h-full" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics | AptSpace Property</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="../assets/js/tailwind-config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/responsive.css" />
</head>
<body>
  <div id="page-content">
    <div class="kpi-grid mb-6">
      <div class="kpi-card"><div class="kpi-value">+3%</div><div class="kpi-label">Occupancy Trend (MoM)</div></div>
      <div class="kpi-card"><div class="kpi-value">₱124K</div><div class="kpi-label">Maintenance Cost (MTD)</div></div>
      <div class="kpi-card"><div class="kpi-value">75%</div><div class="kpi-label">Projects On Track</div></div>
    </div>
    <section class="timeline-workspace min-h-[500px]">
      <div class="timeline-workspace-header">
        <div class="flex items-center gap-4"><div class="w-1.5 h-8 bg-primary rounded-full"></div><h3 class="font-headline-sm text-on-surface">Property Analytics</h3></div>
      </div>
      <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="border border-outline-variant rounded-xl p-5">
          <h4 class="font-headline-sm mb-4">Revenue vs Expenses</h4>
          <div class="space-y-3 text-body-sm">
            <div class="flex justify-between"><span>Revenue</span><span class="font-bold text-secondary">₱2.4M</span></div>
            <div class="flex justify-between"><span>Expenses</span><span class="font-bold">₱1.1M</span></div>
            <div class="flex justify-between border-t pt-2"><span>Net</span><span class="font-bold text-primary">₱1.3M</span></div>
          </div>
        </div>
        <div class="border border-outline-variant rounded-xl p-5">
          <h4 class="font-headline-sm mb-4">Key Metrics</h4>
          <div class="space-y-2 text-body-sm">
            <div class="flex justify-between py-2 border-b border-outline-variant/30"><span>Avg Stay Length</span><span class="font-bold">4.2 days</span></div>
            <div class="flex justify-between py-2 border-b border-outline-variant/30"><span>Turnover Rate</span><span class="font-bold">12%</span></div>
            <div class="flex justify-between py-2"><span>Guest Satisfaction</span><span class="font-bold text-secondary">4.6 / 5</span></div>
          </div>
        </div>
      </div>
    </section>
  </div>
  <script type="module">
    import { initShell } from '../assets/js/shell.js';
    await initShell({ portal: 'property', active: 'analytics', title: 'Analytics', subtitle: 'Mission Control' });
  </script>
</body>
</html>
