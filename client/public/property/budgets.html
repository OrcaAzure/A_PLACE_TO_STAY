<!DOCTYPE html>
<html class="h-full" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budgets | AptSpace Property</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="../assets/js/tailwind-config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/responsive.css" />
</head>
<body>
  <div id="page-content">
    <div class="kpi-grid mb-6">
      <div class="kpi-card"><div class="kpi-value">₱8.5M</div><div class="kpi-label">Total Budget (FY26)</div></div>
      <div class="kpi-card"><div class="kpi-value">₱5.8M</div><div class="kpi-label">Spent to Date</div></div>
      <div class="kpi-card"><div class="kpi-value">68%</div><div class="kpi-label">Utilization</div></div>
    </div>
    <section class="timeline-workspace">
      <div class="timeline-workspace-header">
        <div class="flex items-center gap-4"><div class="w-1.5 h-8 bg-primary rounded-full"></div><h3 class="font-headline-sm text-on-surface">Budget Allocation</h3></div>
      </div>
      <table class="data-table">
        <thead><tr><th>Category</th><th>Allocated</th><th>Spent</th><th>Remaining</th><th>% Used</th></tr></thead>
        <tbody>
          <tr><td class="font-medium">Facilities</td><td>₱4,200,000</td><td>₱2,856,000</td><td>₱1,344,000</td><td>68%</td></tr>
          <tr><td class="font-medium">Renovation</td><td>₱2,500,000</td><td>₱1,000,000</td><td>₱1,500,000</td><td>40%</td></tr>
          <tr><td class="font-medium">Operations</td><td>₱1,800,000</td><td>₱1,476,000</td><td>₱324,000</td><td>82%</td></tr>
        </tbody>
      </table>
    </section>
  </div>
  <script type="module">
    import { initShell } from '../assets/js/shell.js';
    await initShell({ portal: 'property', active: 'budgets', title: 'Budgets', subtitle: 'Mission Control' });
  </script>
</body>
</html>
