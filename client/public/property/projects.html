<!DOCTYPE html>
<html class="h-full" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects | AptSpace Property</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="../assets/js/tailwind-config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/responsive.css" />
</head>
<body>
  <div id="page-content">
    <div class="kpi-grid mb-6">
      <div class="kpi-card"><div class="kpi-value">12</div><div class="kpi-label">Total Projects</div></div>
      <div class="kpi-card"><div class="kpi-value">8</div><div class="kpi-label">Active Projects</div></div>
      <div class="kpi-card"><div class="kpi-value">68%</div><div class="kpi-label">Budget Used</div></div>
      <div class="kpi-card"><div class="kpi-value">2</div><div class="kpi-label">Overdue Projects</div></div>
    </div>
    <div id="timeline-mount"></div>
  </div>
  <script type="module">
    import { initShell } from '../assets/js/shell.js';
    const [shell, rows] = await Promise.all([
      fetch('../components/timeline-shell.html').then((r) => r.text()),
      fetch('../components/timeline-rows-projects.html').then((r) => r.text()),
    ]);
    document.getElementById('timeline-mount').innerHTML = shell
      .replace('{{TIMELINE_TITLE}}', 'Project Operations Timeline')
      .replace('{{TIMELINE_ROWS}}', rows);
    await initShell({ portal: 'property', active: 'projects', title: 'Project Management', subtitle: 'Mission Control' });
  </script>
</body>
</html>
