<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
  <meta name="description" content="APTS — A Place To Stay. Book Global Missions Center lodging and campus venues. For faculty, staff, students, missionaries, and approved guests."/>
  <title>APTS | A Place To Stay</title>
  <link rel="icon" href="/assets/logo/apts-favicon.svg" type="image/svg+xml"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="/assets/js/config/tailwind-theme-base.js"></script>
  <script src="/assets/js/config/tailwind-guest.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=IBM+Plex+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.cdnfonts.com/css/rillosta-133416" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/assets/css/global/landing.css?v=explore-carousel4"/>
  <link rel="stylesheet" href="/assets/css/global/landing-preloader.css?v=welcome-swoosh2"/>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@dotlottie/player-component@2.7.12/dist/dotlottie-player.mjs" data-apt-dotlottie></script>
  <style>
    /* Critical: hide landing until intro finishes (before external CSS loads) */
    body.lp-preloader-active #lp-page,
    body.lp-page-hidden #lp-page {
      display: none !important;
    }
    body:not(.lp-ready) #lp-page .lp-login-btn,
    body:not(.lp-ready) #lp-page .lp-mobile-signin,
    body:not(.lp-ready) #lp-page .lp-mobile-cta a[href*="login"] {
      visibility: hidden !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
    }
  </style>
  <!-- Inline failsafe: if landing-boot.js never runs (blocked CDN/module), still reveal the page -->
  <script>
    (function () {
      var FAILSAFE_MS = 12000;
      window.setTimeout(function () {
        if (document.body.classList.contains('lp-ready')) return;
        document.body.classList.remove('lp-preloader-active', 'lp-page-hidden', 'lp-welcome-active');
        document.body.classList.add('lp-ready');
        var pre = document.getElementById('lp-preloader');
        if (pre) pre.remove();
        var wel = document.getElementById('lp-welcome');
        if (wel) wel.remove();
      }, FAILSAFE_MS);
    })();
  </script>
</head>
<body class="lp-shell bg-background text-on-surface font-body-md overflow-x-hidden lp-preloader-active lp-page-hidden">

<div id="lp-preloader" class="lp-preloader" role="status" aria-live="polite" aria-label="Loading APTS">
  <div class="lp-preloader-surface" aria-hidden="true"></div>
  <div class="lp-preloader-circle" aria-hidden="true"></div>
  <div class="lp-preloader-content">
    <img
      class="lp-preloader-logo"
      src="/assets/logo/apts-favicon.svg"
      alt=""
      width="40"
      height="40"
      decoding="async"
      aria-hidden="true"
    />
    <p class="lp-preloader-word" id="lp-preloader-word">Hello</p>
  </div>
  <div class="lp-preloader-progress" aria-hidden="true"><span class="lp-preloader-progress-bar"></span></div>
</div>

<div id="lp-page">

<!-- NAV -->
<header class="lp-nav lp-nav-is-visible fixed top-0 inset-x-0 z-50 border-b border-outline-variant/15">
  <div class="lp-nav-inner relative flex items-center gap-3 w-full px-4 sm:px-6 max-w-[1380px] mx-auto min-h-[4.25rem] h-[4.25rem]">
    <a href="/" class="lp-nav-brand flex items-center gap-2.5 min-w-0 shrink-0 z-[1]">
      <img src="/assets/logo/apts-mark.svg" alt="" width="36" height="36" class="w-9 h-9 shrink-0 drop-shadow-md" decoding="async"/>
      <span class="hidden sm:block min-w-0">
        <span class="text-headline-sm font-bold text-primary tracking-tight block leading-tight">APTS</span>
        <span class="apts-brand-tagline text-[13px] block truncate">A Place To Stay</span>
      </span>
    </a>

    <nav class="lp-nav-links hidden md:flex flex-1 justify-center items-center gap-1 px-2 min-w-0" aria-label="Primary">
      <a class="lp-nav-link" href="#facilities" data-nav-section="facilities">Facilities</a>
      <a class="lp-nav-link" href="#contact" data-nav-section="contact">Contact</a>
    </nav>

    <div class="lp-nav-actions flex items-center gap-2 shrink-0 ml-auto md:ml-0 z-[1]">
      <button type="button" id="lp-menu-toggle" class="lp-menu-btn md:hidden" aria-label="Open menu" aria-expanded="false" aria-controls="lp-mobile-menu">
        <span class="material-symbols-outlined">menu</span>
      </button>

      <a href="/login.html" class="lp-login-btn lp-magnetic hidden sm:inline-flex items-center justify-center gap-1.5 px-5 py-2.5 bg-primary text-white rounded-full text-label-md font-semibold hover:bg-primary-container transition-all shadow-md shadow-primary/25 whitespace-nowrap">
        Sign in
        <span class="material-symbols-outlined text-[17px]">arrow_forward</span>
      </a>
    </div>
  </div>

  <div id="lp-mobile-menu" class="lp-mobile-menu hidden md:hidden" aria-hidden="true">
    <nav class="flex flex-col gap-1 p-4 pb-5" aria-label="Mobile">
      <a class="lp-mobile-link" href="#facilities" data-nav-section="facilities">
        <span class="material-symbols-outlined text-[20px] text-primary/80">domain</span>
        Facilities
      </a>
      <a class="lp-mobile-link" href="#contact" data-nav-section="contact">
        <span class="material-symbols-outlined text-[20px] text-primary/80">support_agent</span>
        Contact
      </a>
      <a href="/login.html" class="lp-mobile-signin mt-4 inline-flex items-center justify-center gap-2 w-full py-3 bg-primary text-white rounded-xl font-semibold text-label-md shadow-md">
        Sign in
        <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
      </a>
    </nav>
  </div>
</header>

<nav class="lp-section-scroller hidden 2xl:block" aria-label="Page sections">
  <div class="lp-section-scroller-rail">
    <ol class="lp-section-scroller-list">
      <li>
        <a href="#hero" class="lp-section-scroller-item" data-nav-section="hero">
          <span class="lp-section-scroller-label">Home</span>
          <span class="lp-section-scroller-dot" aria-hidden="true"></span>
        </a>
      </li>
      <li>
        <a href="#explore" class="lp-section-scroller-item" data-nav-section="explore">
          <span class="lp-section-scroller-label">Explore</span>
          <span class="lp-section-scroller-dot" aria-hidden="true"></span>
        </a>
      </li>
      <li>
        <a href="#facilities" class="lp-section-scroller-item" data-nav-section="facilities">
          <span class="lp-section-scroller-label">Facilities</span>
          <span class="lp-section-scroller-dot" aria-hidden="true"></span>
        </a>
      </li>
      <li>
        <a href="#contact" class="lp-section-scroller-item" data-nav-section="contact">

          <span class="lp-section-scroller-dot" aria-hidden="true"></span>
        </a>
      </li>
    </ol>
  </div>
</nav>

<main class="lp-main" id="lp-main-mount"></main>

<div class="lp-mobile-cta md:hidden gap-3">
  <a href="#facilities" class="inline-flex items-center gap-2 px-5 py-3 border border-outline-variant text-primary rounded-xl font-semibold text-label-md bg-white">
    Browse
  </a>
  <a href="/login.html" class="inline-flex items-center gap-2 px-5 py-3 bg-primary text-white rounded-xl font-bold text-label-md shadow-md">
    Sign in
    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
  </a>
</div>

</div><!-- /#lp-page -->

  <script type="module" src="/assets/js/layout/landing-boot.js"></script>
  <script nomodule>
    document.body.classList.remove('lp-preloader-active', 'lp-page-hidden', 'lp-welcome-active');
    document.body.classList.add('lp-ready');
    var pre = document.getElementById('lp-preloader');
    if (pre) pre.remove();
  </script>

</body>
</html>
