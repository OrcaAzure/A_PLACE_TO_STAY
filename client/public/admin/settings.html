<!DOCTYPE html>
<html class="h-full" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings | AptSpace</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="../assets/js/tailwind-config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/responsive.css" />
</head>
<body>
  <div id="page-content">
    <section class="timeline-workspace min-h-[500px]">
      <div class="timeline-workspace-header">
        <div class="flex items-center gap-4">
          <div class="w-1.5 h-8 bg-primary rounded-full"></div>
          <h3 class="font-headline-sm text-on-surface">System Settings</h3>
        </div>
        <div class="flex gap-2">
          <button type="button" data-tab="account" class="px-4 py-1.5 border-b-2 border-primary text-primary text-label-sm font-bold">Account</button>
          <button type="button" data-tab="roles" class="px-4 py-1.5 border-b-2 border-transparent text-on-surface-variant text-label-sm">User Roles</button>
          <button type="button" data-tab="system" class="px-4 py-1.5 border-b-2 border-transparent text-on-surface-variant text-label-sm">System</button>
        </div>
      </div>
      <div class="p-6 max-w-2xl">
        <div data-tab-content="account" class="space-y-4">
          <div><label class="text-label-sm text-on-surface-variant block mb-1">Full Name</label><input type="text" value="Admin User" class="w-full border border-outline-variant rounded-lg px-3 py-2.5 text-body-sm" /></div>
          <div><label class="text-label-sm text-on-surface-variant block mb-1">Email</label><input type="email" value="admin@aptspace.com" class="w-full border border-outline-variant rounded-lg px-3 py-2.5 text-body-sm" /></div>
          <button type="button" class="px-6 py-2.5 bg-primary text-on-primary rounded-lg font-label-md">Save Changes</button>
        </div>
        <div data-tab-content="roles" class="hidden">
          <table class="data-table">
            <thead><tr><th>Role</th><th>Description</th><th>Users</th></tr></thead>
            <tbody>
              <tr><td>Super Admin</td><td>Full system access</td><td>2</td></tr>
              <tr><td>Admin</td><td>Manage bookings and users</td><td>5</td></tr>
              <tr><td>Student</td><td>Guest booking access</td><td>248</td></tr>
            </tbody>
          </table>
        </div>
        <div data-tab-content="system" class="hidden space-y-4">
          <div><label class="text-label-sm text-on-surface-variant block mb-1">Fiscal Year</label><select class="w-full border border-outline-variant rounded-lg px-3 py-2.5 text-body-sm"><option>FY26</option><option>FY25</option></select></div>
          <div><label class="text-label-sm text-on-surface-variant block mb-1">Timezone</label><select class="w-full border border-outline-variant rounded-lg px-3 py-2.5 text-body-sm"><option>Asia/Manila (UTC+8)</option></select></div>
        </div>
      </div>
    </section>
  </div>
  <script type="module">
    import { initShell } from '../assets/js/shell.js';
    await initShell({ active: 'settings', title: 'Settings', subtitle: 'Mission Control' });
  </script>
</body>
</html>
