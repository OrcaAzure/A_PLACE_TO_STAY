<!DOCTYPE html>
<html class="h-full" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reservations | AptSpace</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="../assets/js/tailwind-config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/responsive.css" />
</head>
<body>
  <div id="page-content">
    <div id="action-cards-mount"></div>
    <div id="timeline-mount" class="w-full flex flex-col"></div>
  </div>
  <script type="module">
    import { requireAuth }   from '../assets/js/auth.js';
    import { initAppLayout } from '../assets/js/ui.js';
    import { getBookings, normalizeBooking } from '../assets/js/api.js';

    if (!requireAuth()) throw new Error('Not authenticated');

    const [actionCards, shell, rows] = await Promise.all([
      fetch('../components/action-cards-reservations.html').then(r => r.text()),
      fetch('../components/timeline-shell.html').then(r => r.text()),
      fetch('../components/timeline-rows-reservations.html').then(r => r.text()),
    ]);

    document.getElementById('action-cards-mount').innerHTML = actionCards;
    document.getElementById('timeline-mount').innerHTML = shell
      .replace('{{TIMELINE_TITLE}}', 'Reservation Master Timeline')
      .replace('{{TIMELINE_ROWS}}', rows);

    await initAppLayout({
      portal:     'admin',
      activePage: 'reservations',
      title:      'Reservation Operations Center',
      subtitle:   'Mission Control',
    });

    // load live booking count into the action card
    try {
      const bookings = await getBookings();
      const pending  = bookings.filter(b => b.status === 'Pending').length;
      const countEl  = document.getElementById('pending-count');
      if (countEl) countEl.textContent = `${pending} PENDING`;
    } catch { /* API not running yet — static UI still works */ }
  </script>
</body>
</html>
