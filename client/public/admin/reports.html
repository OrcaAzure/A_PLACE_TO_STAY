<!DOCTYPE html>
<html class="h-full" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reports | AptSpace</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="../assets/js/tailwind-config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/responsive.css" />
</head>
<body>
  <div id="page-content">
    <div class="kpi-grid mb-6">
      <div class="kpi-card"><div class="kpi-value">87%</div><div class="kpi-label">Avg Occupancy</div></div>
      <div class="kpi-card"><div class="kpi-value">312</div><div class="kpi-label">Bookings (YTD)</div></div>
      <div class="kpi-card"><div class="kpi-value">₱18.2M</div><div class="kpi-label">Revenue (YTD)</div></div>
      <div class="kpi-card"><div class="kpi-value">4.2 days</div><div class="kpi-label">Avg Stay Length</div></div>
    </div>
    <section class="timeline-workspace min-h-[500px]">
      <div class="timeline-workspace-header">
        <div class="flex items-center gap-4">
          <div class="w-1.5 h-8 bg-primary rounded-full"></div>
          <h3 class="font-headline-sm text-on-surface">Occupancy &amp; Reservation Reports</h3>
        </div>
        <button type="button" class="px-4 py-2 bg-primary text-on-primary rounded-lg text-label-sm font-bold">Export Report</button>
      </div>
      <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="border border-outline-variant rounded-xl p-5">
          <h4 class="font-headline-sm mb-4">Occupancy by Building</h4>
          <div class="space-y-3">
            <div><div class="flex justify-between text-body-sm mb-1"><span>PCALM</span><span class="font-bold">92%</span></div><div class="h-2 bg-surface-container-high rounded-full"><div class="h-2 bg-primary rounded-full" style="width:92%"></div></div></div>
            <div><div class="flex justify-between text-body-sm mb-1"><span>Thesda</span><span class="font-bold">78%</span></div><div class="h-2 bg-surface-container-high rounded-full"><div class="h-2 bg-primary rounded-full" style="width:78%"></div></div></div>
            <div><div class="flex justify-between text-body-sm mb-1"><span>House</span><span class="font-bold">85%</span></div><div class="h-2 bg-surface-container-high rounded-full"><div class="h-2 bg-primary rounded-full" style="width:85%"></div></div></div>
          </div>
        </div>
        <div class="border border-outline-variant rounded-xl p-5">
          <h4 class="font-headline-sm mb-4">Reservation Status Breakdown</h4>
          <div class="space-y-2 text-body-sm">
            <div class="flex justify-between py-2 border-b border-outline-variant/30"><span>Approved</span><span class="font-bold text-secondary">186</span></div>
            <div class="flex justify-between py-2 border-b border-outline-variant/30"><span>Pending</span><span class="font-bold text-amber-700">18</span></div>
            <div class="flex justify-between py-2 border-b border-outline-variant/30"><span>Cancelled</span><span class="font-bold">12</span></div>
            <div class="flex justify-between py-2"><span>Rejected</span><span class="font-bold text-error">4</span></div>
          </div>
        </div>
      </div>
    </section>
  </div>
  <script type="module">
    import { initShell } from '../assets/js/shell.js';
    await initShell({ portal: 'admin', active: 'reports', title: 'Reports &amp; Analytics', subtitle: 'Mission Control' });
  </script>
</body>
</html>
