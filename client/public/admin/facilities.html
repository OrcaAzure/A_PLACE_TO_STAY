<!DOCTYPE html>
<html class="h-full" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facilities | AptSpace Admin</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="../assets/js/tailwind-config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/responsive.css" />
  <style>
    #page-content .scrollbar-none::-webkit-scrollbar {
      display: none;
    }
    #page-content .scrollbar-none {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .matrix-room-card {
      min-height: 0;
      background: #fff;
      border-top-width: 3px;
    }

    .matrix-room-card:focus-visible {
      outline: 2px solid #2563eb;
      outline-offset: 2px;
    }

  </style>
</head>
<body class="h-full bg-slate-50/50">

  <div id="page-content" class="w-full flex flex-col space-y-6 antialiased text-slate-700">
    
    <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm flex flex-col xl:flex-row xl:items-center justify-between gap-4">
      <div class="flex items-center gap-2 overflow-x-auto pb-2 xl:pb-0 scrollbar-none">
        <button type="button" data-status-filter="" class="status-pill-btn bg-blue-600 text-white px-4 py-2 text-xs font-bold rounded-lg transition-all flex items-center gap-2 shrink-0 shadow-sm shadow-blue-500/10">
          <span class="material-symbols-outlined text-[18px]">apps</span>
          <span>All Rooms</span>
        </button>
        <button type="button" data-status-filter="Available" class="status-pill-btn text-slate-500 hover:bg-slate-50 px-4 py-2 text-xs font-semibold rounded-lg transition-all flex items-center gap-2 shrink-0">
          <span class="material-symbols-outlined text-[18px] text-emerald-600">check_circle</span>
          <span>Available</span>
        </button>
        <button type="button" data-status-filter="Occupied" class="status-pill-btn text-slate-500 hover:bg-slate-50 px-4 py-2 text-xs font-semibold rounded-lg transition-all flex items-center gap-2 shrink-0">
          <span class="material-symbols-outlined text-[18px] text-amber-500">hotel</span>
          <span>Occupied</span>
        </button>
        <button type="button" data-status-filter="Maintenance" class="status-pill-btn text-slate-500 hover:bg-slate-50 px-4 py-2 text-xs font-semibold rounded-lg transition-all flex items-center gap-2 shrink-0">
          <span class="material-symbols-outlined text-[18px] text-rose-500">build</span>
          <span>Maintenance</span>
        </button>
      </div>
      
      <div class="flex flex-wrap items-center gap-4 text-[11px] font-bold text-slate-400 uppercase tracking-wider self-start xl:self-auto bg-slate-50/60 p-2 rounded-lg border border-slate-100">
        <div class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full bg-emerald-500 inline-block"></span><span>Vacant</span></div>
        <div class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full bg-amber-500 inline-block"></span><span>Occupied</span></div>
        <div class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full bg-rose-500 inline-block"></span><span>Maint.</span></div>
      </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
      <div class="bg-white p-6 rounded-xl border border-slate-100 shadow-sm flex items-center justify-between group hover:border-blue-500/30 transition-colors">
        <div>
          <p class="text-slate-400 text-xs font-semibold tracking-wide uppercase">Total Capacity</p>
          <h3 class="text-3xl font-bold mt-1 text-slate-800" id="total-rooms">LOADING...</h3>
        </div>
        <div class="p-3.5 bg-blue-50 text-blue-600 rounded-xl group-hover:bg-blue-600 group-hover:text-white transition-colors flex items-center justify-center">
          <span class="material-symbols-outlined text-[26px]">meeting_room</span>
        </div>
      </div>
      <div class="bg-white p-6 rounded-xl border border-slate-100 shadow-sm flex items-center justify-between group hover:border-emerald-500/30 transition-colors">
        <div>
          <p class="text-slate-400 text-xs font-semibold tracking-wide uppercase">Available Units</p>
          <h3 class="text-3xl font-bold mt-1 text-slate-800" id="available-rooms">LOADING...</h3>
        </div>
        <div class="p-3.5 bg-emerald-50 text-emerald-600 rounded-xl group-hover:bg-emerald-600 group-hover:text-white transition-colors flex items-center justify-center">
          <span class="material-symbols-outlined text-[26px]">check_circle</span>
        </div>
      </div>
      <div class="bg-white p-6 rounded-xl border border-slate-100 shadow-sm flex items-center justify-between group hover:border-amber-500/30 transition-colors">
        <div>
          <p class="text-slate-400 text-xs font-semibold tracking-wide uppercase">Occupied Units</p>
          <h3 class="text-3xl font-bold mt-1 text-slate-800" id="occupied-rooms">LOADING...</h3>
        </div>
        <div class="p-3.5 bg-amber-50 text-amber-600 rounded-xl group-hover:bg-amber-600 group-hover:text-white transition-colors flex items-center justify-center">
          <span class="material-symbols-outlined text-[26px]">hotel</span>
        </div>
      </div>
    </div>

    <section class="bg-white rounded-xl border border-slate-100 shadow-sm overflow-hidden flex flex-col">
      <div class="px-4 py-3 border-b border-slate-100 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
        <div class="flex items-center gap-3 min-w-0">
          <div class="w-1 h-6 bg-blue-600 rounded-full shrink-0"></div>
          <div class="min-w-0">
            <h3 class="text-sm font-semibold text-slate-800">Key Status Matrix Board</h3>
            <p class="text-[11px] text-slate-400 leading-snug">Room statuses across buildings</p>
          </div>
        </div>
        
        <div class="flex items-center gap-1 bg-slate-50 p-1 rounded-lg border border-slate-100 overflow-x-auto scrollbar-none shrink-0" id="building-tab-triggers">
          </div>
      </div>

      <div class="p-4 sm:p-5 bg-slate-50/40">
        <div id="key-tags-grid-mount" class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-2.5 sm:gap-3 min-h-[140px]">
          </div>
      </div>
    </section>

  </div>

  <script type="module">
    import { requireAuth }             from '../assets/js/auth.js';
    import { initAppLayout }           from '../assets/js/ui.js';
    import { getRooms, normalizeRoom } from '../assets/js/api.js';

    if (!requireAuth()) throw new Error('Not authenticated');

    await initAppLayout({
      portal:     'admin',
      activePage: 'facilities',
      title:      'Facilities Operations Center',
      subtitle:   'Mission Control',
    });

    let allRooms = [];
    let currentBuildingFilter = "";
    let currentStatusFilter = "";

    function getStatusTokens(status) {
      if (status === 'Available') {
        return {
          accent: 'border-t-emerald-500',
          pill: 'bg-emerald-50 text-emerald-800 border-emerald-200',
          dot: 'bg-emerald-500',
          iconColor: 'text-emerald-500',
          icon: 'check_circle',
          footer: 'Ready for use',
        };
      }
      if (status === 'Occupied') {
        return {
          accent: 'border-t-amber-500',
          pill: 'bg-amber-50 text-amber-800 border-amber-200',
          dot: 'bg-amber-500',
          iconColor: 'text-amber-500',
          icon: 'hotel',
          footer: 'Currently in use',
        };
      }
      return {
        accent: 'border-t-rose-500',
        pill: 'bg-rose-50 text-rose-800 border-rose-200',
        dot: 'bg-rose-500',
        iconColor: 'text-rose-500',
        icon: 'build',
        footer: 'Under maintenance',
      };
    }

    function formatCapacityMeta(n) {
      if (n.capacityMax != null && n.capacityMax !== '') {
        const cap = Number(n.capacityMax);
        if (!Number.isNaN(cap) && cap > 0) {
          if (n.occupancy != null && n.occupancy !== '' && Number(n.occupancy) >= 0) {
            return `${n.occupancy} / ${cap} guests`;
          }
          return `Up to ${cap} guests`;
        }
      }
      return '';
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // Direct interface generation framework modeling the physical tracking hook system
    function generateInteractiveGrid(list) {
      const gridMount = document.getElementById('key-tags-grid-mount');
      
      const filtered = list.filter(r => {
        const n = normalizeRoom(r);
        return (!currentBuildingFilter || n.building === currentBuildingFilter) &&
               (!currentStatusFilter   || n.status === currentStatusFilter);
      });

      if (filtered.length === 0) {
        gridMount.className = "flex items-center justify-center py-10 w-full col-span-full";
        gridMount.innerHTML = `
          <div class="text-center">
            <span class="material-symbols-outlined text-slate-300 text-3xl mb-1.5">sensor_door</span>
            <p class="text-[11px] font-medium text-slate-400">No rooms match the active filter criteria.</p>
          </div>`;
        return;
      }

      gridMount.className = "grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-2.5 sm:gap-3 w-full";
      gridMount.innerHTML = filtered.map(r => {
        const n = normalizeRoom(r);
        const tokens = getStatusTokens(n.status);
        const capacityMeta = formatCapacityMeta(n);
        const roomLabel = escapeHtml(n.roomNumber);
        const roomType = escapeHtml(n.roomType);
        const building = escapeHtml(n.building);
        const statusLabel = escapeHtml(n.status);
        
        return `
          <div class="matrix-room-card group cursor-pointer rounded-xl border border-slate-200/90 ${tokens.accent} bg-white px-3.5 py-3 shadow-sm shadow-slate-200/60 transition-all duration-200 hover:border-slate-300 hover:shadow-md hover:shadow-slate-300/50 hover:-translate-y-0.5 flex flex-col min-w-0 text-left">
            <div class="flex items-start justify-between gap-2 min-w-0">
              <h4 class="text-sm font-bold text-slate-800 leading-snug truncate" title="${roomLabel}">${roomLabel}</h4>
              <span class="inline-flex items-center gap-1 shrink-0 rounded-full border px-2 py-0.5 text-[11px] font-semibold leading-tight ${tokens.pill}">
                <span class="w-1.5 h-1.5 rounded-full ${tokens.dot}"></span>
                ${statusLabel}
              </span>
            </div>

            <div class="mt-2 space-y-1.5 min-w-0">
              <p class="text-xs text-slate-500 truncate flex items-center gap-1.5 min-w-0" title="${roomType}">
                <span class="material-symbols-outlined text-[15px] text-slate-400 shrink-0">meeting_room</span>
                <span class="truncate">${roomType}</span>
              </p>
              ${capacityMeta ? `
              <p class="text-xs text-slate-600 flex items-center gap-1.5">
                <span class="material-symbols-outlined text-[15px] text-slate-400 shrink-0">group</span>
                <span class="font-medium tabular-nums">${escapeHtml(capacityMeta)}</span>
              </p>` : ''}
            </div>

            <div class="mt-2.5 pt-2 border-t border-slate-100 flex items-center justify-between gap-2 min-w-0">
              <span class="text-[11px] text-slate-400 truncate flex items-center gap-1 min-w-0" title="${building}">
                <span class="material-symbols-outlined text-[14px] shrink-0">location_on</span>
                <span class="truncate">${building}</span>
              </span>
              <span class="text-[11px] text-slate-400 shrink-0 flex items-center gap-1">
                <span class="material-symbols-outlined text-[14px] ${tokens.iconColor}">${tokens.icon}</span>
                <span class="hidden sm:inline">${escapeHtml(tokens.footer)}</span>
              </span>
            </div>
          </div>`;
      }).join('');
    }

    // Dynamic generation structure setup for building tracking anchors
    function buildTabTriggers(list) {
      const triggerMount = document.getElementById('building-tab-triggers');
      const uniqueBuildings = [...new Set(list.map(r => normalizeRoom(r).building))].filter(Boolean);

      let HTML = `<button type="button" data-bldg="" class="bldg-tab-btn px-3 py-1.5 text-xs font-bold bg-white text-slate-800 shadow-sm rounded-md transition-all">All Buildings</button>`;
      
      HTML += uniqueBuildings.map(bldg => {
        return `<button type="button" data-bldg="${bldg}" class="bldg-tab-btn px-3 py-1.5 text-xs font-semibold text-slate-500 hover:text-slate-800 transition-all">${bldg}</button>`;
      }).join('');

      triggerMount.innerHTML = HTML;

      // Click binding handling for dynamic tab panels selectors
      document.querySelectorAll('.bldg-tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.bldg-tab-btn').forEach(b => {
            b.className = "bldg-tab-btn px-3 py-1.5 text-xs font-semibold text-slate-500 hover:text-slate-800 transition-all";
          });
          btn.className = "bldg-tab-btn px-3 py-1.5 text-xs font-bold bg-white text-slate-800 shadow-sm rounded-md transition-all";
          currentBuildingFilter = btn.getAttribute('data-bldg');
          generateInteractiveGrid(allRooms);
        });
      });
    }

    try {
      allRooms = await getRooms();

      document.getElementById('total-rooms').textContent     = `${allRooms.length} Total`;
      document.getElementById('available-rooms').textContent = allRooms.filter(r => normalizeRoom(r).status === 'Available').length;
      document.getElementById('occupied-rooms').textContent  = allRooms.filter(r => normalizeRoom(r).status === 'Occupied').length;

      buildTabTriggers(allRooms);
      generateInteractiveGrid(allRooms);

      // Event listener registration structure setup for status triggers
      document.querySelectorAll('.status-pill-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.status-pill-btn').forEach(b => {
            b.className = "status-pill-btn text-slate-500 hover:bg-slate-50 px-4 py-2 text-xs font-semibold rounded-lg transition-all flex items-center gap-2 shrink-0";
          });
          btn.className = "status-pill-btn bg-blue-600 text-white px-4 py-2 text-xs font-bold rounded-lg transition-all flex items-center gap-2 shrink-0 shadow-sm shadow-blue-500/10";
          currentStatusFilter = btn.getAttribute('data-status-filter');
          generateInteractiveGrid(allRooms);
        });
      });

    } catch (err) {
      document.getElementById('key-tags-grid-mount').innerHTML = `
        <div class="col-span-full text-center text-rose-600 font-medium py-8">${err.message}</div>`;
    }
  </script>
</body>
</html>
