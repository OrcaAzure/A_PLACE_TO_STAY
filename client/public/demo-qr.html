<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>APTSpace — Scan to open</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem 1.25rem;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      background: #1a365d;
      color: #fff;
      text-align: center;
    }
    h1 { margin: 0; font-size: clamp(1.25rem, 4vw, 1.75rem); font-weight: 700; }
    p { margin: 0; color: rgba(255,255,255,0.75); font-size: 0.9375rem; max-width: 28rem; line-height: 1.5; }
    #qr-wrap {
      background: #fff;
      padding: 1.25rem;
      border-radius: 1rem;
      line-height: 0;
    }
    canvas { display: block; max-width: min(80vw, 320px); height: auto !important; }
    .url {
      font-family: ui-monospace, Consolas, monospace;
      font-size: 0.8125rem;
      word-break: break-all;
      color: #f6ad55;
      padding: 0 0.5rem;
    }
    .hint { font-size: 0.8125rem; opacity: 0.65; }
  </style>
</head>
<body>
  <h1>Scan to open APTSpace</h1>
  <p>Same Wi‑Fi required. Opens the landing page (intro skipped).</p>
  <div id="qr-wrap"><canvas id="qr"></canvas></div>
  <p class="url" id="url"></p>
  <p class="hint">Share this screen so guests can scan with their phone camera.</p>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <script>
    const port = window.location.port || '3000';
    const demoUrl = window.location.protocol + '//' + window.location.hostname + ':' + port + '/?skipIntro=1';
    document.getElementById('url').textContent = demoUrl;
    QRCode.toCanvas(document.getElementById('qr'), demoUrl, {
      width: 320,
      margin: 2,
      color: { dark: '#1a365d', light: '#ffffff' },
    });
  </script>
</body>
</html>
