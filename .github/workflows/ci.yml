name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit
    defaults:
      run:
        working-directory: client/server
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: aptspace
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Configure test environment
        run: |
          cp ../../.env.example .env
          sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=root/' .env
          sed -i 's/^JWT_SECRET=.*/JWT_SECRET=ci_test_jwt_secret_minimum_32_chars_long/' .env
          sed -i 's/^NODE_ENV=.*/NODE_ENV=test/' .env

      - name: Import database schema
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client
          mysql -h 127.0.0.1 -P 3306 -uroot -proot aptspace < ../../database/schema.sql

      - name: Seed test data
        run: |
          node --input-type=module -e "
            import './test/helpers/env-setup.mjs';
            import { runSeed } from './src/config/seed.js';
            import { closePool } from './src/config/db.js';
            let code = 0;
            try {
              await runSeed();
              console.log('seed complete');
            } catch (err) {
              console.error(err);
              code = 1;
            } finally {
              await closePool();
            }
            process.exit(code);
          "

      - name: Run full test suite
        run: npm test
